<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dịch vụ Xây dựng & Sửa chữa | ToamViet.com.vn</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/mobile.css" />

    <style>
        :root {
            --vip-color: #008B8B;
            --hover-color: #FF8C00;
            --soft-bg: #f8fafc;
            --border-color: #e5e7eb;
            --text-main: #0f172a;
            --text-soft: #64748b;
        }

        body {
            font-family: "Roboto", sans-serif;
            background-color: var(--soft-bg);
            color: #1e293b;
        }

        .container-custom {
            max-width: 1366px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .main-title {
            font-size: 21.33px;
            font-weight: 900;
        }

        .filter-box {
            background: white;
            border-radius: 24px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .filter-grid-desktop {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(220px, 0.9fr) minmax(220px, 0.9fr) 180px;
            gap: 14px;
            align-items: center;
        }

        .filter-input,
        .filter-select {
            width: 100%;
            min-height: 54px;
            padding: 12px 16px;
            border: 1px solid #dbe3eb;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            background: white;
            outline: none;
            transition: all 0.25s ease;
        }

        .filter-input:focus,
        .filter-select:focus {
            border-color: var(--vip-color);
            box-shadow: 0 0 0 4px rgba(0, 139, 139, 0.08);
        }

        .filter-submit-btn {
            width: 100%;
            min-height: 54px;
            border-radius: 16px;
            background: var(--hover-color);
            color: white;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.25s ease;
            padding: 0 16px;
        }

        .filter-submit-btn:hover {
            background: #ea7b00;
        }

        .con-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .con-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.10);
            border-color: rgba(0, 139, 139, 0.35);
        }

        .con-card-image {
            position: relative;
            height: 230px;
            overflow: hidden;
            background: #e5e7eb;
        }

        .con-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .con-card:hover .con-card-image img {
            transform: scale(1.06);
        }

        .con-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 7px 12px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
            z-index: 2;
            max-width: calc(100% - 32px);
        }

        .con-card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .con-company {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 40px;
        }

        .con-company-avatar {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            background: #0f766e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .con-company-name {
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            line-height: 1.4;
            letter-spacing: 0.03em;
        }

        .con-card-title {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.45;
            color: #0f172a;
            min-height: 56px;
        }

        .con-card-desc {
            font-size: 14px;
            color: #64748b;
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .con-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            background: #f8fafc;
            border: 1px solid #eef2f7;
            border-radius: 16px;
            padding: 14px;
        }

        .con-meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .con-meta-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .con-meta-value {
            font-size: 14px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.45;
            word-break: break-word;
        }

        .con-meta-value.highlight {
            color: var(--vip-color);
        }

        .con-card-footer {
            margin-top: auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .con-btn-main {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 16px;
            border-radius: 14px;
            background: var(--vip-color);
            color: white;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .con-btn-main:hover {
            background: #0f766e;
        }

        .con-btn-outline {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            border: 1px solid #dbe4ee;
            background: white;
            color: #64748b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .con-btn-outline:hover {
            color: #ef4444;
            border-color: #fecaca;
            background: #fff5f5;
        }

        .con-btn-outline.active {
            color: #ef4444;
            border-color: #fecaca;
            background: #fff5f5;
        }

        .empty-box {
            background: white;
            border: 1px dashed #cbd5e1;
            border-radius: 18px;
            padding: 22px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.8;
        }

        .service-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 6px 10px;
            border-radius: 999px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .service-chip.demo {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #93c5fd;
        }

        .service-chip.live {
            background: #ecfeff;
            color: #0f766e;
            border: 1px solid #99f6e4;
        }

        @media (max-width: 1199px) {
            .filter-grid-desktop {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .filter-box {
                border-radius: 22px;
            }

            .filter-grid-desktop {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .filter-input,
            .filter-select,
            .filter-submit-btn {
                min-height: 52px;
                border-radius: 16px;
            }

            .con-card {
                border-radius: 20px;
            }

            .con-card-image {
                height: 210px;
            }

            .con-card-body {
                padding: 16px;
                gap: 12px;
            }

            .con-card-title {
                font-size: 17px;
                min-height: auto;
            }

            .con-card-desc {
                font-size: 13px;
            }

            .con-meta-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                padding: 12px;
            }

            .con-meta-label {
                font-size: 9px;
            }

            .con-meta-value {
                font-size: 13px;
            }

            .con-btn-main {
                font-size: 11px;
                padding: 12px 14px;
            }

            .con-btn-outline {
                width: 42px;
                height: 42px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div id="site-mobile-menu"></div>

    <section class="bg-slate-900 py-16 text-white text-center">
        <div class="container-custom">
            <h1 class="main-title uppercase mb-4">Tìm kiếm nhà thầu & dịch vụ xây dựng</h1>
            <p class="text-slate-400 max-w-2xl mx-auto mb-8 text-sm">
                Kết nối trực tiếp với các đơn vị thi công, kiến trúc sư, kỹ sư và nhà thầu uy tín đang đăng dịch vụ trên ToamViet.
            </p>

            <div class="filter-box max-w-6xl mx-auto p-4 md:p-5">
                <div class="filter-grid-desktop">
                    <input id="keywordFilter" type="text" class="filter-input" placeholder="Tìm theo tên dịch vụ, công ty, mô tả..." />

                    <select id="serviceTypeFilter" class="filter-select">
                        <option value="">Loại hình thi công</option>
                        <option value="Xây nhà trọn gói">Xây nhà trọn gói</option>
                        <option value="Thi công phần thô">Thi công phần thô</option>
                        <option value="Sửa chữa / Cải tạo">Sửa chữa / Cải tạo</option>
                        <option value="Thiết kế kiến trúc">Thiết kế kiến trúc</option>
                        <option value="Nội thất / Hoàn thiện">Nội thất / Hoàn thiện</option>
                    </select>

                    <select id="cityFilter" class="filter-select">
                        <option value="">Khu vực</option>
                    </select>

                    <button id="applyFilterBtn" class="filter-submit-btn">
                        Tìm kiếm
                    </button>
                </div>
            </div>
        </div>
    </section>

    <main class="py-12">
        <div class="container-custom">
            <div id="data-note" class="empty-box mb-6 hidden"></div>

            <div class="flex justify-between items-end mb-8 border-l-4 border-[--vip-color] pl-4 gap-4 flex-wrap">
                <div>
                    <h2 class="font-black text-xl text-slate-800">Dịch vụ thi công tiêu biểu</h2>
                    <p class="text-xs text-slate-500 mt-1 uppercase font-bold tracking-widest">Dữ liệu cập nhật mới nhất từ doanh nghiệp và cá nhân</p>
                </div>
                <div class="text-xs font-bold text-slate-400">
                    Hiển thị <span id="resultCount">0</span> kết quả
                </div>
            </div>

            <div id="listingContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <div id="site-footer"></div>

    <button id="goToTop" onclick="safeScrollToTop()"><i class="fa-solid fa-chevron-up"></i></button>

    <div class="zalo-chat-btn wiggle" onclick="safeToggleForm()">
        <i class="fa-solid fa-comment-dots"></i>
    </div>

    <div id="chatForm">
        <div class="chat-header">
            <span><i class="fa-solid fa-comments"></i> Hỗ trợ Tổ Ấm Việt</span>
            <span onclick="safeToggleForm()" style="cursor:pointer; font-size: 20px;">&times;</span>
        </div>
        <div class="chat-body">
            <input type="text" id="cusName" placeholder="Tên của bạn..." required />
            <textarea id="cusMsg" rows="3" placeholder="Bạn cần tư vấn dịch vụ nào?"></textarea>
            <button class="btn-send" onclick="sendToZalo()">BẮT ĐẦU CHAT TRÊN ZALO</button>
        </div>
    </div>

    <script src="../assets/js/user-storage.js"></script>
    <script src="../assets/js/post-storage.js"></script>
    <script src="../assets/js/project-service.js"></script>
    <script src="../assets/js/component-loader.js"></script>

    <script>
        const CONSTRUCTION_FAVORITE_KEY = "favoriteConstructionPosts";
        const FALLBACK_IMAGE = "../assets/images/fallback-property.jpg";

        const listingContainer = document.getElementById("listingContainer");
        const resultCount = document.getElementById("resultCount");
        const dataNote = document.getElementById("data-note");
        const keywordFilter = document.getElementById("keywordFilter");
        const serviceTypeFilter = document.getElementById("serviceTypeFilter");
        const cityFilter = document.getElementById("cityFilter");
        const applyFilterBtn = document.getElementById("applyFilterBtn");

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function safeScrollToTop() {
            if (typeof window.scrollToTop === "function") {
                window.scrollToTop();
            } else {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function safeToggleForm() {
            if (typeof window.toggleForm === "function") {
                window.toggleForm();
            } else {
                const chatForm = document.getElementById("chatForm");
                if (!chatForm) return;
                chatForm.style.display = chatForm.style.display === "block" ? "none" : "block";
            }
        }

        function sendToZalo() {
            const name = document.getElementById("cusName").value.trim();
            const msg = document.getElementById("cusMsg").value.trim();
            const phone = "0946239289";

            if (!name) {
                alert("Vui lòng cho biết tên của bạn");
                return;
            }

            const fullMsg = "Chào admin Tổ Ấm Việt, tôi là " + name + ". " + msg;
            const encodedMsg = encodeURIComponent(fullMsg);
            window.open("https://zalo.me/" + phone + "?text=" + encodedMsg, "_blank");
        }

        function createPostId(post, index = 0) {
            return (
                post.id ||
                post.postId ||
                post.slug ||
                `${post.title || "tin"}-${post.city || ""}-${post.ward || ""}-${index}`
                    .toLowerCase()
                    .replace(/\s+/g, "-")
            );
        }

        function normalizePhone(phone) {
            return String(phone || "").replace(/[^\d+]/g, "");
        }

        function buildLocation(post) {
            return [post.ward, post.city].filter(Boolean).join(", ");
        }

        function buildPoster(post) {
            return post.brandName || post.contactName || post.fullName || post.serviceBrand || "Đơn vị thi công";
        }

        function getPosterRole(post) {
            return post.roleLabel || post.role || (post.profileType === "doanhnghiep" ? "Doanh nghiệp / Nhà thầu" : "Cá nhân / Kỹ sư");
        }

        function getAvatarText(post) {
            const source = buildPoster(post);
            return source
                .split(" ")
                .filter(Boolean)
                .slice(0, 2)
                .map(word => word.charAt(0).toUpperCase())
                .join("") || "TV";
        }

        function getCardImage(post) {
            if (post.thumbnail && typeof post.thumbnail === "string" && post.thumbnail.trim()) {
                return post.thumbnail;
            }

            if (Array.isArray(post.images) && post.images.length) {
                const firstImage = post.images[0];
                if (typeof firstImage === "string" && firstImage.trim()) return firstImage;
                if (firstImage && firstImage.dataUrl) return firstImage.dataUrl;
                if (firstImage && firstImage.url) return firstImage.url;
            }
            return FALLBACK_IMAGE;
        }

        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(CONSTRUCTION_FAVORITE_KEY) || "[]");
            } catch (error) {
                return [];
            }
        }

        function setFavorites(favorites) {
            localStorage.setItem(CONSTRUCTION_FAVORITE_KEY, JSON.stringify(favorites));
        }

        function isFavorite(postId) {
            return getFavorites().includes(postId);
        }

        function toggleFavorite(postId) {
            const favorites = getFavorites();
            const exists = favorites.includes(postId);
            const next = exists ? favorites.filter(id => id !== postId) : [...favorites, postId];
            setFavorites(next);
            renderListings();
        }

        function getConstructionPosts() {
            let posts = [];

            if (window.postStorage && typeof window.postStorage.getConstructionPosts === "function") {
                posts = window.postStorage.getConstructionPosts() || [];
            } else if (window.postStorage && typeof window.postStorage.getAllPosts === "function") {
                posts = (window.postStorage.getAllPosts() || []).filter(post => post && post.flow === "construction");
            } else {
                posts = JSON.parse(localStorage.getItem("allPosts") || "[]");
            }

            return posts.filter(post => {
                if (!post) return false;
                const flow = String(post.flow || "").toLowerCase().trim();
                const status = String(post.status || "").toLowerCase().trim();

                return flow === "construction" && (
                    status === "approved" ||
                    status === "demo" ||
                    status === "pending" ||
                    status === ""
                );
            });
        }

        function getFallbackConstructionPosts() {
            return [
                {
                    id: "demo-build-1",
                    title: "Thi công biệt thự phố hiện đại - Chìa khóa trao tay 2026",
                    flow: "construction",
                    postType: "xaydung",
                    status: "demo",
                    serviceType: "Xây nhà trọn gói",
                    servicePrice: "5.8 - 6.5 triệu/m²",
                    serviceExp: "8 năm kinh nghiệm",
                    serviceArea: "Dĩ An, Thuận An",
                    serviceBrand: "Bình Dương Cons Co., Ltd",
                    serviceSpecialty: "Biệt thự, nhà phố",
                    city: "Bình Dương",
                    ward: "Dĩ An",
                    description: "Giải pháp thi công đồng bộ từ thiết kế đến bàn giao hoàn thiện, phù hợp khách hàng cần tiến độ rõ ràng và kiểm soát chi phí tốt.",
                    contactName: "Bình Dương Cons Co., Ltd",
                    contactPhone: "0946239289",
                    contactEmail: "demo1@toamviet.vn",
                    contactProfileUrl: "../pages/danh-ba-doanh-nghiep.html",
                    profileType: "doanhnghiep",
                    roleLabel: "Doanh nghiệp / Nhà thầu",
                    createdAt: "2026-01-08T08:00:00.000Z",
                    images: [FALLBACK_IMAGE],
                    thumbnail: FALLBACK_IMAGE
                },
                {
                    id: "demo-build-2",
                    title: "Tư vấn thiết kế kiến trúc và nội thất nhà phố xanh",
                    flow: "construction",
                    postType: "xaydung",
                    status: "demo",
                    serviceType: "Thiết kế kiến trúc",
                    servicePrice: "150k - 250k/m²",
                    serviceExp: "6 năm kinh nghiệm",
                    serviceArea: "TP.HCM, Bình Dương",
                    serviceBrand: "Studio Kiến Trúc Việt",
                    serviceSpecialty: "3D + hồ sơ kỹ thuật",
                    city: "TP.HCM",
                    ward: "Thủ Đức",
                    description: "Phù hợp gia chủ cần hồ sơ thiết kế hiện đại, tối ưu công năng, phối cảnh 3D đẹp và dễ triển khai thi công thực tế.",
                    contactName: "Studio Kiến Trúc Việt",
                    contactPhone: "0901234567",
                    contactEmail: "demo2@toamviet.vn",
                    contactProfileUrl: "../pages/danh-ba-doanh-nghiep.html",
                    profileType: "doanhnghiep",
                    roleLabel: "Đơn vị thiết kế",
                    createdAt: "2026-01-06T09:00:00.000Z",
                    images: [FALLBACK_IMAGE],
                    thumbnail: FALLBACK_IMAGE
                },
                {
                    id: "demo-build-3",
                    title: "Cải tạo nhà phố cũ, nâng tầng, chống thấm, sơn sửa hoàn thiện",
                    flow: "construction",
                    postType: "xaydung",
                    status: "demo",
                    serviceType: "Sửa chữa / Cải tạo",
                    servicePrice: "Liên hệ báo giá",
                    serviceExp: "10 năm thi công",
                    serviceArea: "Hà Nội, Bắc Ninh",
                    serviceBrand: "Fix Home Service",
                    serviceSpecialty: "Trọn gói cải tạo",
                    city: "Hà Nội",
                    ward: "Cầu Giấy",
                    description: "Dành cho khách hàng cần nâng cấp nhà ở nhanh, xử lý hạng mục xuống cấp và tối ưu lại thẩm mỹ trước khi ở hoặc cho thuê.",
                    contactName: "Fix Home Service",
                    contactPhone: "0988123456",
                    contactEmail: "demo3@toamviet.vn",
                    contactProfileUrl: "../pages/danh-ba-doanh-nghiep.html",
                    profileType: "doanhnghiep",
                    roleLabel: "Đội thi công cải tạo",
                    createdAt: "2026-01-04T10:00:00.000Z",
                    images: [FALLBACK_IMAGE],
                    thumbnail: FALLBACK_IMAGE
                }
            ];
        }

        function fillCityFilter(posts) {
            const currentValue = cityFilter.value;
            const uniqueCities = [...new Set(posts.map(post => post.city).filter(Boolean))].sort((a, b) => a.localeCompare(b, "vi"));

            cityFilter.innerHTML =
                '<option value="">Khu vực</option>' +
                uniqueCities.map(city => `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`).join("");

            if (uniqueCities.includes(currentValue)) {
                cityFilter.value = currentValue;
            }
        }

        function applyFilters(posts) {
            let filtered = [...posts];

            const keyword = keywordFilter.value.trim().toLowerCase();
            const serviceType = serviceTypeFilter.value;
            const city = cityFilter.value;

            if (keyword) {
                filtered = filtered.filter(post => {
                    const text = [
                        post.title,
                        post.description,
                        post.serviceType,
                        post.serviceBrand,
                        post.serviceSpecialty,
                        post.serviceArea,
                        buildLocation(post),
                        buildPoster(post)
                    ].filter(Boolean).join(" ").toLowerCase();

                    return text.includes(keyword);
                });
            }

            if (serviceType) {
                filtered = filtered.filter(post => (post.serviceType || "") === serviceType);
            }

            if (city) {
                filtered = filtered.filter(post => (post.city || "") === city);
            }

            filtered.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            return filtered;
        }

        function getServiceBadge(post) {
            const serviceType = String(post.serviceType || "Dịch vụ xây dựng").trim();
            return serviceType.length > 18 ? serviceType.slice(0, 18) + "..." : serviceType;
        }

        function getStatusChip(post) {
            const status = String(post.status || "").toLowerCase();
            if (status === "demo") {
                return '<span class="service-chip demo"><i class="fa-solid fa-flask"></i> Demo</span>';
            }
            return '<span class="service-chip live"><i class="fa-solid fa-bolt"></i> Đang hiển thị</span>';
        }

        function getDetailUrl(post, postId) {
            if (post.detailUrl) return post.detailUrl;
            return `../pages/chi-tiet-tin.html?id=${encodeURIComponent(postId)}`;
        }

        function renderCard(post, index) {
            const postId = createPostId(post, index);
            const detailUrl = getDetailUrl(post, postId);
            const imageUrl = escapeHtml(getCardImage(post));
            const title = escapeHtml(post.title || "Dịch vụ xây dựng");
            const company = escapeHtml(buildPoster(post));
            const role = escapeHtml(getPosterRole(post));
            const price = escapeHtml(post.servicePrice || "Liên hệ");
            const area = escapeHtml(post.serviceArea || buildLocation(post) || "Đang cập nhật");
            const specialty = escapeHtml(post.serviceSpecialty || "Đang cập nhật");
            const exp = escapeHtml(post.serviceExp || "Đang cập nhật");
            const desc = escapeHtml(post.description || "Đang cập nhật mô tả dịch vụ.");
            const avatarText = escapeHtml(getAvatarText(post));
            const favoriteActive = isFavorite(postId);
            const phoneRaw = post.contactPhone || post.phone || "";
            const phoneLink = normalizePhone(phoneRaw);
            const profileUrl = post.contactProfileUrl || (post.profileType === "doanhnghiep" ? "../pages/danh-ba-doanh-nghiep.html" : "../pages/danh-ba-moi-gioi.html");

            return `
                <div class="con-card">
                    <div class="con-card-image">
                        <a href="${detailUrl}" aria-label="${title}">
                            <img src="${imageUrl}" alt="${title}" onerror="this.src='${FALLBACK_IMAGE}'">
                        </a>
                        <span class="con-badge bg-[#008B8B]">${escapeHtml(getServiceBadge(post))}</span>
                    </div>

                    <div class="con-card-body">
                        <div class="flex items-center justify-between gap-3">
                            <a href="${profileUrl}" class="con-company min-w-0 flex-1">
                                <div class="con-company-avatar">${avatarText}</div>
                                <div class="con-company-name truncate">${company}</div>
                            </a>
                            ${getStatusChip(post)}
                        </div>

                        <a href="${detailUrl}">
                            <h3 class="con-card-title">${title}</h3>
                        </a>

                        <p class="con-card-desc">${desc}</p>

                        <div class="con-meta-grid">
                            <div class="con-meta-item">
                                <span class="con-meta-label">Đơn giá / báo giá</span>
                                <span class="con-meta-value highlight">${price}</span>
                            </div>
                            <div class="con-meta-item">
                                <span class="con-meta-label">Khu vực</span>
                                <span class="con-meta-value">${area}</span>
                            </div>
                            <div class="con-meta-item">
                                <span class="con-meta-label">Chuyên môn</span>
                                <span class="con-meta-value">${specialty}</span>
                            </div>
                            <div class="con-meta-item">
                                <span class="con-meta-label">Năng lực</span>
                                <span class="con-meta-value">${exp}</span>
                            </div>
                        </div>

                        <div class="text-[12px] text-slate-500 leading-6">
                            <strong class="text-slate-700">Vai trò:</strong> ${role}
                        </div>

                        <div class="con-card-footer">
                            ${
                                phoneLink
                                    ? `<a href="tel:${phoneLink}" class="con-btn-main">
                                            <i class="fa-solid fa-phone"></i>
                                            Liên hệ ngay
                                       </a>`
                                    : `<a href="${detailUrl}" class="con-btn-main">
                                            <i class="fa-solid fa-file-lines"></i>
                                            Xem chi tiết
                                       </a>`
                            }

                            <button
                                type="button"
                                class="con-btn-outline ${favoriteActive ? "active" : ""}"
                                onclick="toggleFavorite('${escapeHtml(postId).replace(/'/g, "\\'")}')"
                                aria-label="Lưu dịch vụ">
                                <i class="${favoriteActive ? "fa-solid" : "fa-regular"} fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderListings() {
            let posts = getConstructionPosts();

            if (!posts.length) {
                posts = getFallbackConstructionPosts();
                dataNote.classList.remove("hidden");
                dataNote.innerHTML = `
                    Hiện tại chưa có dịch vụ xây dựng thật nào được duyệt để hiển thị ngoài public.
                    Hệ thống đang hiển thị <strong>dữ liệu mẫu</strong> để bạn dễ kiểm tra giao diện.
                    Sau khi bạn đăng nội dung từ trang <strong>Đăng tin</strong> theo luồng <strong>Xây dựng</strong>, dữ liệu sẽ tự động xuất hiện tại đây.
                `;
            } else {
                dataNote.classList.add("hidden");
                dataNote.innerHTML = "";
            }

            fillCityFilter(posts);

            const filteredPosts = applyFilters(posts);
            resultCount.textContent = filteredPosts.length;

            if (!filteredPosts.length) {
                listingContainer.innerHTML = `
                    <div class="empty-box md:col-span-2 lg:col-span-3">
                        Không tìm thấy dịch vụ xây dựng phù hợp với bộ lọc hiện tại.
                        Bạn hãy đổi từ khóa, loại hình thi công hoặc khu vực để tìm lại.
                    </div>
                `;
                return;
            }

            listingContainer.innerHTML = filteredPosts.map((post, index) => renderCard(post, index)).join("");
        }

        applyFilterBtn.addEventListener("click", renderListings);

        keywordFilter.addEventListener("keydown", function (event) {
            if (event.key === "Enter") renderListings();
        });

        serviceTypeFilter.addEventListener("change", renderListings);
        cityFilter.addEventListener("change", renderListings);

        window.toggleFavorite = toggleFavorite;
        window.addEventListener("load", renderListings);
    </script>

    <script src="../assets/js/main.js"></script>
</body>
</html>
