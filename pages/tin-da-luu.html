        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function normalizeText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .toLowerCase()
                .replace(/\s+/g, " ")
                .trim();
        }

        function slugifyText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-");
        }

        async function initSharedComponents() {
            try {
                if (typeof loadComponent === "function") {
                    await loadComponent("site-header", "../components/header-inner.html");
                    await loadComponent("site-mobile-menu", "../components/mobile-menu-inner.html");
                    await loadComponent("site-footer", "../components/footer-inner.html");

                    if (typeof setupFixedHeaderSpacing === "function") {
                        setupFixedHeaderSpacing();
                    }
                    if (typeof watchHeaderSpacing === "function") {
                        watchHeaderSpacing();
                    }
                }
            } catch (error) {
                console.error("Không thể load component dùng chung:", error);
            }
        }

        function safeScrollToTop() {
            if (typeof window.scrollToTop === "function") {
                window.scrollToTop();
            } else {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function safeToggleForm() {
            if (typeof window.toggleForm === "function") {
                window.toggleForm();
            } else {
                const chatForm = document.getElementById("chatForm");
                if (!chatForm) return;
                chatForm.style.display = chatForm.style.display === "block" ? "none" : "block";
            }
        }

        function sendToZalo() {
            const name = document.getElementById("cusName").value.trim();
            const msg = document.getElementById("cusMsg").value.trim();
            const phone = "0946239289";

            if (!name) {
                alert("Vui lòng cho biết tên của bạn");
                return;
            }

            const fullMsg = "Chào admin Tổ Ấm Việt, tôi là " + name + ". " + msg;
            const encodedMsg = encodeURIComponent(fullMsg);
            window.open("https://zalo.me/" + phone + "?text=" + encodedMsg, "_blank");
        }

        function normalizePhone(phone) {
            return String(phone || "").replace(/[^\d+]/g, "");
        }

        function getStorageArray(key) {
            try {
                const raw = JSON.parse(localStorage.getItem(key) || "[]");
                return Array.isArray(raw) ? raw : [];
            } catch (error) {
                return [];
            }
        }

        function setStorageArray(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function getSaleFavorites() {
            return getStorageArray(FAVORITE_SALE_STORAGE_KEY).map(id => String(id).trim()).filter(Boolean);
        }

        function getRentalFavorites() {
            return getStorageArray(FAVORITE_RENTAL_STORAGE_KEY).map(id => String(id).trim()).filter(Boolean);
        }

        function getConstructionFavorites() {
            return getStorageArray(FAVORITE_CONSTRUCTION_STORAGE_KEY).map(id => String(id).trim()).filter(Boolean);
        }

        function updateHeaderFavoriteCount() {
            const saleTotal = getSaleFavorites().length;
            const rentalTotal = getRentalFavorites().length;
            const constructionTotal = getConstructionFavorites().length;
            const total = saleTotal + rentalTotal + constructionTotal;

            const badges = document.querySelectorAll("#favorite-count-badge, #headerFavoriteCount");
            badges.forEach((badge) => {
                badge.textContent = total;
            });

            totalSavedCount.textContent = total;
            saleCount.textContent = saleTotal;
            rentalCount.textContent = rentalTotal;
            constructionCount.textContent = constructionTotal;
        }

                setStorageArray(FAVORITE_SALE_STORAGE_KEY, getSaleFavorites().filter(id => id !== normalizedId));
            } else if (tab === "rental") {
                setStorageArray(FAVORITE_RENTAL_STORAGE_KEY, getRentalFavorites().filter(id => id !== normalizedId));
            } else {
                setStorageArray(FAVORITE_CONSTRUCTION_STORAGE_KEY, getConstructionFavorites().filter(id => id !== normalizedId));
            }

            updateHeaderFavoriteCount();
            renderSavedListings();
        }

        function createPostId(post, index) {
            if (post && post.id !== undefined && post.id !== null && String(post.id).trim()) {
                return String(post.id).trim();
            }

            if (post && post.postId !== undefined && post.postId !== null && String(post.postId).trim()) {
                return String(post.postId).trim();
            }

            if (post && post.slug !== undefined && post.slug !== null && String(post.slug).trim()) {
                return String(post.slug).trim();
            }

            const stableParts = [
                post.title,
                post.propertyType,
                post.serviceType,
                post.serviceBrand,
                post.city,
                post.district,
                post.ward,
                post.contactPhone,
                post.createdAt,
                index
            ];

            return stableParts.map(slugifyText).filter(Boolean).join("-") || "saved-post";
        }

        function parsePriceToNumber(priceText) {
            if (!priceText) return 0;

            const text = String(priceText).toLowerCase().trim().replace(/,/g, ".");
            const numbers = text.match(/[\d.]+/g) || [];
            const first = parseFloat(numbers[0]) || 0;

            if (text.includes("tỷ")) return first * 1000000000;
            if (text.includes("triệu")) return first * 1000000;
            if (text.includes("nghìn") || text.includes("ngàn")) return first * 1000;

            return first;
        }

        function parseRentalPriceToMillion(priceText) {
            if (!priceText) return 0;

            const raw = String(priceText).toLowerCase().trim().replace(/,/g, ".");
            const nums = raw.match(/\d+(\.\d+)?/g);
            if (!nums || !nums.length) return 0;

            if (raw.includes("tỷ")) return parseFloat(nums[0]) * 1000;
            if (raw.includes("triệu")) return parseFloat(nums[0]);
            if (raw.includes("nghìn")) return parseFloat(nums[0]) / 1000;

            const value = parseFloat(nums[0]);
            return Number.isNaN(value) ? 0 : value;
        }

        function getCardImage(post) {
            if (post.thumbnail && typeof post.thumbnail === "string" && post.thumbnail.trim()) {
                return post.thumbnail;
            }

            if (Array.isArray(post.images) && post.images.length) {
                const firstImage = post.images[0];
                if (typeof firstImage === "string" && firstImage.trim()) return firstImage;
                if (firstImage && firstImage.dataUrl) return firstImage.dataUrl;
                if (firstImage && firstImage.url) return firstImage.url;
            }

            return FALLBACK_IMAGE;
        }

        function buildLocation(post) {
            return [post.ward, post.district, post.city].filter(Boolean).join(", ");

        function buildPoster(post) {
            return post.brandName || post.contactName || post.fullName || post.serviceBrand || "Người đăng";
        }

        function getPosterSub(post) {
            const rawRole = post.roleLabel || post.role || "";
            const normalizedRole = normalizeText(rawRole);

            if (normalizedRole.includes("doanh nghiep") || normalizedRole.includes("doanhnghiep")) {
                return "Doanh nghiệp";
            }

            if (
                normalizedRole.includes("moi gioi") ||
                normalizedRole.includes("chuyen vien") ||
                normalizedRole.includes("nha thau") ||
                normalizedRole.includes("don vi")
            ) {
                return rawRole;
            }

            if (normalizedRole.includes("ca nhan") || normalizeText(post.profileType) === "canhan") {
                return "Cá nhân";
            }

            if (normalizeText(post.profileType) === "doanhnghiep") {
                return "Doanh nghiệp";
            }

            return rawRole || (post.profileType === "doanhnghiep" ? "Doanh nghiệp" : "Người đăng");
        }

        function getAvatarText(post) {
            const source = buildPoster(post);
            return source
                .split(" ")
                .filter(Boolean)
                .slice(0, 2)
                .map(word => word.charAt(0).toUpperCase())
                .join("") || "TV";
        }

        function getProfileUrl(post, postId) {
            if (normalizeText(post.flow) === "construction" || normalizeText(post.postType) === "xaydung") {
                return `../pages/chi-tiet-doanh-nghiep.html?id=${encodeURIComponent(String(postId || "").trim())}`;

            if (normalizeText(post.profileType) === "doanhnghiep") {
                return `../pages/chi-tiet-doanh-nghiep.html?id=${encodeURIComponent(String(postId || "").trim())}`;

        function getVipLevel(post) {
            const raw = String(
                post.vipLevel ||
                post.vipType ||
                post.vipPackage ||

            if (!raw) return "";

            if (raw.includes("kim") || raw.includes("diamond")) return "kim-cuong";
            if (raw.includes("vang") || raw.includes("gold")) return "vang";
            if (raw.includes("bac") || raw.includes("silver")) return "bac";
            if (raw.includes("dong") || raw.includes("bronze")) return "dong";

            return "";

            const map = {

                "bac": "VIP Bạc",
                "dong": "VIP Đồng"
            };
            return map[level] || "";

            if (post.detailUrl) return post.detailUrl;
            return `../pages/chi-tiet-tin.html?id=${encodeURIComponent(postId)}`;
        }

        function calculatePricePerM2(post) {
            const totalPrice = parsePriceToNumber(post.propertyPrice);
            const areaNumber = Number(post.propertyArea || 0);

            if (!totalPrice || !areaNumber) return "Chưa rõ";

            const unit = totalPrice / areaNumber;
            if (unit >= 1000000000) return (unit / 1000000000).toFixed(2) + " tỷ/m²";
            if (unit >= 1000000) return Math.round(unit / 1000000) + " triệu/m²";
            return Math.round(unit).toLocaleString("vi-VN") + " đ/m²";
        }

            let posts = [];

            try {

                    posts = JSON.parse(localStorage.getItem("allPosts") || "[]");
                }
            } catch (error) {
                posts = [];

            const filtered = posts.filter(post =>
                post &&
                normalizeText(post.flow) === "real_estate" &&

            const filtered = posts.filter(post => {

                const flow = normalizeText(post.flow);

                const isRental = postType === "thue" || postType === "cho-thue" || postType === "rent";
                const isVisible = ["approved", "demo", "published", "pending", ""].includes(status);

                                    <i class="fa-solid fa-eye"></i> Xem chi tiết
                                </a>

                                <button type="button" class="remove-btn flex items-center gap-2" onclick="removeFavorite('construction','${escapeHtml(postId).replace(/'/g, "\\'")}')">
                                    <i class="fa-solid fa-trash-can"></i> Bỏ lưu
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;

            saleTabBtn.classList.toggle("active", tab === "sale");
            rentalTabBtn.classList.toggle("active", tab === "rental");
            constructionTabBtn.classList.toggle("active", tab === "construction");

            renderSavedListings();
        }

        function renderSavedListings() {
            updateHeaderFavoriteCount();

            const savedPosts = getSavedPostsByTab(currentTab);

            if (!savedPosts.length) {
                savedListingContainer.innerHTML = `
                    <div class="empty-box">
                        <p class="text-[15px] font-bold text-gray-700 mb-2">Chưa có tin nào trong mục này</p>
                        <p class="text-sm">Bạn hãy quay lại trang danh sách để lưu thêm tin phù hợp.</p>
                    </div>
                `;
                return;
            }

            savedListingContainer.innerHTML = savedPosts
                .map((post, index) => {
                    if (currentTab === "sale") return renderSaleCard(post, index);
                    if (currentTab === "rental") return renderRentalCard(post, index);
                    return renderConstructionCard(post, index);
                })
                .join("");
        }

        function renderSidebarList(container, items) {
            container.innerHTML = items.map(function (item) {
                return `
                    <a href="${escapeHtml(item.url || '#')}" class="sidebar-item">
                        <div class="sidebar-item-title">${escapeHtml(item.title || "Nội dung đang cập nhật")}</div>
                        <div class="sidebar-item-sub">${escapeHtml(item.subtitle || "Thông tin chi tiết sẽ được cập nhật thêm.")}</div>
                    </a>
                `;
            }).join("");
        }

        function renderSidebars() {
            renderSidebarList(newsSidebarList, fallbackNewsItems);
            renderSidebarList(projectSidebarList, fallbackProjectItems);
        }

        function renderSeoFallback() {
            const container = document.getElementById("seoContent");
            if (!container) return;

            container.innerHTML = `
                <div class="seo-wrapper">
                    <div class="seo-text collapsed" id="seoContent-text">
                        <p>Trang tin đã lưu giúp người dùng quản lý nhanh những tin bán, tin thuê và dịch vụ xây dựng đã quan tâm trên hệ thống ToamViet. Đây là một lớp tiện ích quan trọng giúp tăng trải nghiệm quay lại xem tin, so sánh tin và ra quyết định thuận tiện hơn.</p>
                        <p>Với nhóm người dùng đang theo dõi nhiều sản phẩm cùng lúc, trang này đóng vai trò như một khu vực quản lý cá nhân, nơi các nội dung quan tâm được gom lại theo từng nhóm để tiết kiệm thời gian tìm lại. Điều này đặc biệt hữu ích khi người dùng muốn đối chiếu giá, khu vực, pháp lý hoặc đơn vị đăng tin.</p>
                        <p>Về lâu dài, trang tin đã lưu cũng hỗ trợ tốt cho hệ sinh thái nội dung của website vì tạo thêm luồng quay lại giữa các trang bán, thuê, xây dựng, tin tức và dự án, từ đó giúp hành trình sử dụng mạch lạc và đồng bộ hơn trên toàn site.</p>
                    </div>
                    <button
                        type="button"
                        class="seo-toggle-btn"
                        id="seoContent-toggle"
                        aria-expanded="false"
                    >
                        <span class="seo-toggle-label">Xem thêm</span>
                        <i class="fa-solid fa-chevron-down seo-toggle-icon"></i>
                    </button>
                </div>
            `;

            const toggleBtn = document.getElementById("seoContent-toggle");
            const seoText = document.getElementById("seoContent-text");
            const toggleLabel = toggleBtn ? toggleBtn.querySelector(".seo-toggle-label") : null;

            if (!toggleBtn || !seoText || !toggleLabel) return;

            toggleBtn.addEventListener("click", () => {
                const isCollapsed = seoText.classList.contains("collapsed");

                if (isCollapsed) {
                    seoText.classList.remove("collapsed");
                    toggleBtn.classList.add("expanded");
                    toggleBtn.setAttribute("aria-expanded", "true");
                    toggleLabel.textContent = "Thu gọn";
                } else {
                    seoText.classList.add("collapsed");
                    toggleBtn.classList.remove("expanded");
                    toggleBtn.setAttribute("aria-expanded", "false");
                    toggleLabel.textContent = "Xem thêm";
                }
            });
        }

        async function initPage() {
            await initSharedComponents();
            updateHeaderFavoriteCount();
            renderSavedListings();
            renderSidebars();

            if (typeof renderSeoContent === "function") {
                renderSeoContent("seoContent", "saved-posts");
            } else {
                renderSeoFallback();
            }

            setTimeout(updateHeaderFavoriteCount, 400);
        }

        window.addEventListener("load", initPage);

        window.addEventListener("storage", function () {
            updateHeaderFavoriteCount();
            renderSavedListings();
        });

        window.switchTab = switchTab;
        window.removeFavorite = removeFavorite;
    </script>
</body>
</html>
