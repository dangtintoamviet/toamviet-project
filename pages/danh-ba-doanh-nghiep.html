<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh bạ Doanh nghiệp BĐS | ToamViet.com.vn</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/mobile.css">

    <style>
        :root {
            --vip-color: #008B8B;
            --hover-color: #FF8C00;
            --soft-bg: #f4f7fb;
            --text-main: #2C2C2C;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-main);
        }

        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .filter-box {
            background: white;
            border-radius: 18px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        }

        .filter-input,
        .filter-select {
            width: 100%;
            min-height: 46px;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            outline: none;
            background: white;
            font-size: 14px;
            color: #334155;
            transition: all 0.25s ease;
        }

        .filter-input:focus,
        .filter-select:focus {
            border-color: var(--vip-color);
            box-shadow: 0 0 0 3px rgba(0, 139, 139, 0.08);
        }

        .business-card {
            background: white;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            display: flex;
            gap: 18px;
            transition: 0.3s ease;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
        }

        .business-card:hover {
            border-color: rgba(0, 139, 139, 0.45);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
            transform: translateY(-2px);
        }

        .business-logo {
            width: 110px;
            height: 110px;
            border-radius: 16px;
            object-fit: cover;
            background: #f1f5f9;
            border: 1px solid #eef2f7;
            flex-shrink: 0;
        }

        .business-avatar {
            width: 110px;
            height: 110px;
            border-radius: 16px;
            background: linear-gradient(135deg, #0f766e, #008B8B);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 900;
            flex-shrink: 0;
        }

        .business-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--vip-color);
            line-height: 1.45;
            text-transform: uppercase;
            transition: 0.25s ease;
        }

        .business-title:hover {
            color: var(--hover-color);
        }

        .meta-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
        }

        .meta-line i {
            width: 18px;
            color: #94a3b8;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 999px;
            letter-spacing: 0.03em;
            border: 1px solid transparent;
        }

        .chip.blue {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }

        .chip.green {
            background: #ecfdf5;
            color: #047857;
            border-color: #a7f3d0;
        }

        .chip.orange {
            background: #fff7ed;
            color: #c2410c;
            border-color: #fed7aa;
        }

        .chip.gray {
            background: #f8fafc;
            color: #475569;
            border-color: #e2e8f0;
        }

        .stat-box {
            background: #f8fafc;
            border: 1px solid #eef2f7;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 800;
            color: #0f172a;
        }

        .sidebar-title {
            background: #475569;
            color: white;
            padding: 12px 16px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            border-radius: 14px 14px 0 0;
            letter-spacing: 0.04em;
        }

        .sidebar-content {
            background: white;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-top: none;
            border-radius: 0 0 14px 14px;
        }

        .empty-box {
            background: white;
            border: 1px dashed #cbd5e1;
            border-radius: 16px;
            padding: 20px;
            color: #64748b;
            font-size: 14px;
            line-height: 1.8;
        }

        .cta-box {
            background: linear-gradient(135deg, #0f172a, #334155);
            color: white;
            padding: 24px;
            border-radius: 18px;
        }

        .cta-box p {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .business-card {
                flex-direction: column;
                padding: 16px;
            }

            .business-logo,
            .business-avatar {
                width: 84px;
                height: 84px;
            }

            .business-avatar {
                font-size: 22px;
            }

            .business-title {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div id="site-mobile-menu"></div>

    <main class="py-8">
        <div class="container-custom">
            <div class="filter-box p-5 mb-8 border-t-4 border-[--vip-color]">
                <h2 class="text-[--vip-color] font-bold uppercase text-sm mb-4">Tìm kiếm doanh nghiệp bất động sản</h2>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="keywordFilter" type="text" placeholder="Tên công ty, thương hiệu, lĩnh vực..." class="filter-input md:col-span-2">
                    <select id="cityFilter" class="filter-select">

                    <button id="applyFilterBtn" class="bg-[--vip-color] text-white rounded-xl font-bold text-sm py-3 hover:bg-opacity-90 transition">
                        TÌM KIẾM
                    </button>
                </div>

                <div class="flex flex-wrap gap-2 mt-4">
                    <button type="button" class="filter-tab bg-[--vip-color] text-white px-4 py-2 rounded-lg text-sm font-bold" data-type="">
                        Tất cả doanh nghiệp
                    </button>
                    <button type="button" class="filter-tab bg-white border px-4 py-2 rounded-lg text-sm font-semibold hover:border-[--vip-color]" data-type="batdongsan">

                    </button>
                    <button type="button" class="filter-tab bg-white border px-4 py-2 rounded-lg text-sm font-semibold hover:border-[--vip-color]" data-type="xaydung">
                        Xây dựng
                    </button>
                    <button type="button" class="filter-tab bg-white border px-4 py-2 rounded-lg text-sm font-semibold hover:border-[--vip-color]" data-type="mixed">

                </div>
            </div>

            <div id="dataNote" class="empty-box hidden mb-6"></div>

            <div class="flex flex-col lg:flex-row gap-8">
                <div class="lg:w-2/3">
                    <div class="flex items-center justify-between gap-4 mb-6 flex-wrap">
                        <h1 class="text-xl font-bold text-gray-800">Danh bạ Doanh nghiệp</h1>
                        <div class="text-sm font-semibold text-slate-400">
                            Hiển thị <span id="resultCount">0</span> doanh nghiệp
                        </div>
                    </div>

                    <div id="businessList" class="space-y-5"></div>
                </div>

                <div class="lg:w-1/3 space-y-8">
                    <div>
                        <div class="sidebar-title">Lĩnh vực kinh doanh</div>
                        <div class="sidebar-content">
                            <ul id="fieldStats" class="text-sm space-y-3"></ul>
                        </div>
                    </div>

                    <div class="cta-box">
                        <h4 class="font-bold mb-4 uppercase text-sm border-b border-white/20 pb-2">Đăng ký doanh nghiệp</h4>
                        <p class="mb-4">
                            Bạn muốn doanh nghiệp của mình xuất hiện tại ToamViet.com.vn để khách hàng dễ dàng tìm thấy hơn?
                        </p>
                        <a href="../auth/dang-ky.html" class="w-full inline-flex items-center justify-center bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-[--hover-color] hover:text-white transition">
                            ĐĂNG KÝ NGAY
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <button id="goToTop" onclick="safeScrollToTop()"><i class="fa-solid fa-chevron-up"></i></button>

    <div class="zalo-chat-btn wiggle" onclick="safeToggleForm()">
        <i class="fa-solid fa-comment-dots"></i>
    </div>

    <div id="chatForm">
        <div class="chat-header">
            <span><i class="fa-solid fa-comments"></i> Hỗ trợ Tổ Ấm Việt</span>
            <span onclick="safeToggleForm()" style="cursor:pointer; font-size: 20px;">&times;</span>
        </div>
        <div class="chat-body">
            <input type="text" id="cusName" placeholder="Tên của bạn..." required>
            <textarea id="cusMsg" rows="3" placeholder="Bạn cần tư vấn doanh nghiệp nào?"></textarea>
            <button class="btn-send" onclick="sendToZalo()">BẮT ĐẦU CHAT TRÊN ZALO</button>
        </div>
    </div>

    <script src="../assets/js/user-storage.js"></script>
    <script src="../assets/js/post-storage.js"></script>
    <script src="../assets/js/project-service.js"></script>
    <script src="../assets/js/component-loader.js"></script>

    <script>
        const FALLBACK_LOGO = "../assets/images/fallback-property.jpg";

        const keywordFilter = document.getElementById("keywordFilter");
        const cityFilter = document.getElementById("cityFilter");
        const applyFilterBtn = document.getElementById("applyFilterBtn");
        const businessList = document.getElementById("businessList");
        const resultCount = document.getElementById("resultCount");
        const dataNote = document.getElementById("dataNote");
        const fieldStats = document.getElementById("fieldStats");
        const filterTabs = document.querySelectorAll(".filter-tab");

        let currentTypeFilter = "";

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function safeScrollToTop() {
            if (typeof window.scrollToTop === "function") {
                window.scrollToTop();
            } else {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function safeToggleForm() {
            if (typeof window.toggleForm === "function") {
                window.toggleForm();
            } else {
                const chatForm = document.getElementById("chatForm");
                if (!chatForm) return;
                chatForm.style.display = chatForm.style.display === "block" ? "none" : "block";
            }
        }

        function sendToZalo() {
            const name = document.getElementById("cusName").value.trim();
            const msg = document.getElementById("cusMsg").value.trim();
            const phone = "0946239289";

            if (!name) {
                alert("Vui lòng cho biết tên của bạn");
                return;
            }

            const fullMsg = "Chào admin Tổ Ấm Việt, tôi là " + name + ". " + msg;
            const encodedMsg = encodeURIComponent(fullMsg);
            window.open("https://zalo.me/" + phone + "?text=" + encodedMsg, "_blank");
        }

        function safeJsonParse(raw, fallback) {
            try {
                return JSON.parse(raw || JSON.stringify(fallback));
            } catch (error) {
                return fallback;
            }
        }

        function getInitials(name) {
            return String(name || "TV")
                .split(" ")
                .filter(Boolean)
                .slice(0, 2)
                .map(word => word.charAt(0).toUpperCase())
                .join("") || "TV";
        }

        function normalizePhone(phone) {
            return String(phone || "").replace(/[^\d+]/g, "");
        }

        function detectCompanyType(user, posts) {
            const hasConstruction = posts.some(post => String(post.flow || "").toLowerCase() === "construction");
            const hasRealEstate = posts.some(post => String(post.flow || "").toLowerCase() === "real_estate");

            if (hasConstruction && hasRealEstate) return "mixed";
            if (hasConstruction) return "xaydung";
            return "batdongsan";
        }

        function getCompanyTypeLabel(type) {
            if (type === "xaydung") return "Xây dựng";
            if (type === "mixed") return "Tổng hợp";
            return "Bất động sản";
        }

        function getCompanyTypeChip(type) {
            if (type === "xaydung") {
                return '<span class="chip orange"><i class="fa-solid fa-screwdriver-wrench"></i> Xây dựng</span>';
            }
            if (type === "mixed") {
                return '<span class="chip green"><i class="fa-solid fa-layer-group"></i> Tổng hợp</span>';
            }
            return '<span class="chip blue"><i class="fa-solid fa-building"></i> Bất động sản</span>';
        }

        function extractUsersRaw() {
            const sources = [];

            const registeredUsers = safeJsonParse(localStorage.getItem("registeredUsers"), []);
            if (Array.isArray(registeredUsers)) sources.push(...registeredUsers);

            const users = safeJsonParse(localStorage.getItem("users"), []);
            if (Array.isArray(users)) sources.push(...users);

            const currentUser = safeJsonParse(localStorage.getItem("currentUser"), null);
            if (currentUser && typeof currentUser === "object") sources.push(currentUser);

            return sources.filter(Boolean);
        }

        function extractAllPosts() {
            if (window.postStorage && typeof window.postStorage.getAllPosts === "function") {
                return window.postStorage.getAllPosts() || [];
            }
            return safeJsonParse(localStorage.getItem("allPosts"), []);
        }

        function getBusinessDirectory() {
            const rawUsers = extractUsersRaw();
            const allPosts = extractAllPosts();

            const companyMap = new Map();

            rawUsers.forEach((user, index) => {
                const brandName = user.brandName || user.companyName || "";
                const isEnterprise =
                    String(user.profileType || "").toLowerCase() === "doanhnghiep" ||
                    !!brandName;

                if (!isEnterprise) return;

                const key = user.id || user.email || brandName || ("user_" + index);
                const relatedPosts = allPosts.filter(post =>
                    post &&
                    (
                        (user.id && post.userId === user.id) ||
                        (brandName && (post.brandName === brandName || post.contactName === brandName))
                    )
                );

                const companyType = detectCompanyType(user, relatedPosts);
                const city = user.city || relatedPosts.find(post => post.city)?.city || "";
                const address = user.addressDetail || user.address || relatedPosts.find(post => post.addressDetail)?.addressDetail || "";
                const ward = user.ward || relatedPosts.find(post => post.ward)?.ward || "";
                const district = user.district || relatedPosts.find(post => post.district)?.district || "";
                const website = user.website || user.companyWebsite || "";
                const phone = user.phone || user.contactPhone || relatedPosts.find(post => post.contactPhone)?.contactPhone || "";
                const name = brandName || user.fullName || "Doanh nghiệp";
                const roleLabel = user.roleLabel || getCompanyTypeLabel(companyType);
                const fieldList = [];

                if (companyType === "batdongsan" || companyType === "mixed") fieldList.push("Bất động sản");
                if (companyType === "xaydung" || companyType === "mixed") fieldList.push("Xây dựng");

                relatedPosts.forEach(post => {
                    if (post.serviceType) fieldList.push(post.serviceType);
                    if (post.propertyType) fieldList.push(post.propertyType);
                });

                companyMap.set(String(key), {
                    id: String(key),
                    name,
                    city,
                    ward,
                    district,
                    address,
                    website,
                    phone,
                    type: companyType,
                    roleLabel,
                    fields: [...new Set(fieldList)].slice(0, 4),
                    totalPosts: relatedPosts.length,
                    approvedPosts: relatedPosts.filter(post => String(post.status || "").toLowerCase() === "approved").length,
                    profileUrl: user.profileUrl || "../pages/chi-tiet-doanh-nghiep.html?id=" + encodeURIComponent(String(key)),
                    avatarText: getInitials(name),
                    logoUrl: user.logoUrl || user.avatar || user.image || "",
                    email: user.email || "",
                    description: user.description || user.bio || "",
                    source: "user"
                });
            });

            allPosts.forEach((post, index) => {
                const brandName = post.brandName || "";
                if (!brandName) return;

                const key = "post_brand_" + brandName.toLowerCase().replace(/\s+/g, "-");
                const existing = companyMap.get(key);

                if (existing) return;

                const relatedPosts = allPosts.filter(item => item && item.brandName === brandName);
                const companyType = detectCompanyType({}, relatedPosts);

                const fieldList = [];
                if (companyType === "batdongsan" || companyType === "mixed") fieldList.push("Bất động sản");
                if (companyType === "xaydung" || companyType === "mixed") fieldList.push("Xây dựng");

                relatedPosts.forEach(item => {
                    if (item.serviceType) fieldList.push(item.serviceType);
                    if (item.propertyType) fieldList.push(item.propertyType);
                });

                companyMap.set(key, {
                    id: key,
                    name: brandName,
                    city: post.city || "",
                    ward: post.ward || "",
                    district: post.district || "",
                    address: post.addressDetail || "",
                    website: "",
                    phone: post.contactPhone || post.phone || "",
                    type: companyType,
                    roleLabel: post.roleLabel || getCompanyTypeLabel(companyType),
                    fields: [...new Set(fieldList)].slice(0, 4),
                    totalPosts: relatedPosts.length,
                    approvedPosts: relatedPosts.filter(item => String(item.status || "").toLowerCase() === "approved").length,
                    profileUrl: post.contactProfileUrl || "../pages/chi-tiet-doanh-nghiep.html?id=" + encodeURIComponent(key),
                    avatarText: getInitials(brandName),
                    logoUrl: "",
                    email: "",
                    description: "",
                    source: "post"
                });
            });

            return Array.from(companyMap.values());
        }

        function getFallbackBusinesses() {
            return [
                {
                    id: "demo-1",
                    name: "CÔNG TY CỔ PHẦN ĐẦU TƯ TỔ ẤM VIỆT",
                    city: "Hà Nội",
                    ward: "Cầu Giấy",
                    district: "",
                    address: "Tầng 31, Keangnam Landmark 72, Cầu Giấy, Hà Nội",
                    website: "www.toamviet.com.vn",
                    phone: "0946239289",
                    type: "mixed",
                    roleLabel: "Doanh nghiệp / Chủ đầu tư",
                    fields: ["Bất động sản", "Xây dựng", "Chủ đầu tư"],
                    totalPosts: 12,
                    approvedPosts: 8,
                    profileUrl: "../pages/chi-tiet-doanh-nghiep.html?id=demo-1",
                    avatarText: "TA",
                    logoUrl: "",
                    email: "contact@toamviet.com.vn",
                    description: "Đơn vị phát triển hệ sinh thái bất động sản, xây dựng và dịch vụ liên quan."
                },
                {
                    id: "demo-2",
                    name: "TẬP ĐOÀN BẤT ĐỘNG SẢN THUẬN PHÁT",
                    city: "TP.HCM",
                    ward: "Thủ Thiêm",
                    district: "Quận 2",
                    address: "Khu đô thị Sala, Quận 2, TP.HCM",
                    website: "thuanphatland.com.vn",
                    phone: "0901234567",
                    type: "batdongsan",
                    roleLabel: "Sàn giao dịch / Chủ đầu tư",
                    fields: ["Bất động sản", "Sàn giao dịch"],
                    totalPosts: 18,
                    approvedPosts: 11,
                    profileUrl: "../pages/chi-tiet-doanh-nghiep.html?id=demo-2",
                    avatarText: "TP",
                    logoUrl: "",
                    email: "",
                    description: "Chuyên phân phối căn hộ, đất nền và dự án trọng điểm tại phía Nam."
                },
                {
                    id: "demo-3",
                    name: "CÔNG TY XÂY DỰNG AN PHÁT",
                    city: "Hà Giang",
                    ward: "Nguyễn Trãi",
                    district: "",
                    address: "Trung tâm TP Hà Giang",
                    website: "",
                    phone: "0988123456",
                    type: "xaydung",
                    roleLabel: "Doanh nghiệp / Nhà thầu",
                    fields: ["Xây dựng", "Xây nhà trọn gói", "Thi công phần thô"],
                    totalPosts: 9,
                    approvedPosts: 6,
                    profileUrl: "../pages/chi-tiet-doanh-nghiep.html?id=demo-3",
                    avatarText: "AP",
                    logoUrl: "",
                    email: "",
                    description: "Đơn vị chuyên thi công nhà phố, biệt thự và cải tạo công trình dân dụng."
                }
            ];
        }

        function getBusinessData() {
            const businesses = getBusinessDirectory();
            return businesses.length ? businesses : getFallbackBusinesses();
        }

        function fillCityFilter(data) {
            const currentValue = cityFilter.value;
            const cities = [...new Set(data.map(item => item.city).filter(Boolean))].sort((a, b) => a.localeCompare(b, "vi"));

            cityFilter.innerHTML = '<option value="">Tất cả tỉnh thành</option>' +
                cities.map(city => `<option value="${escapeHtml(city)}">${escapeHtml(city)}</option>`).join("");

            if (cities.includes(currentValue)) {
                cityFilter.value = currentValue;
            }
        }

        function applyFilters(data) {
            let filtered = [...data];

            const keyword = keywordFilter.value.trim().toLowerCase();
            const city = cityFilter.value;

            if (keyword) {
                filtered = filtered.filter(item => {
                    const text = [
                        item.name,
                        item.address,
                        item.city,
                        item.ward,
                        item.district,
                        item.website,
                        item.roleLabel,
                        ...(item.fields || [])
                    ].filter(Boolean).join(" ").toLowerCase();

                    return text.includes(keyword);
                });
            }

            if (city) {
                filtered = filtered.filter(item => item.city === city);
            }

            if (currentTypeFilter) {
                filtered = filtered.filter(item => item.type === currentTypeFilter);
            }

            filtered.sort((a, b) => {
                if ((b.approvedPosts || 0) !== (a.approvedPosts || 0)) {
                    return (b.approvedPosts || 0) - (a.approvedPosts || 0);
                }
                return String(a.name || "").localeCompare(String(b.name || ""), "vi");
            });

            return filtered;
        }

        function renderFieldStats(data) {
            const stats = {};

            data.forEach(item => {
                (item.fields || []).forEach(field => {
                    if (!field) return;
                    stats[field] = (stats[field] || 0) + 1;
                });
            });

            const sorted = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            if (!sorted.length) {
                fieldStats.innerHTML = `
                    <li class="text-gray-400">Chưa có dữ liệu lĩnh vực</li>
                `;
                return;
            }

            fieldStats.innerHTML = sorted.map(([name, count]) => `
                <li class="flex justify-between items-center hover:text-[--hover-color] cursor-pointer transition">
                    <span>• ${escapeHtml(name)}</span>
                    <span class="text-gray-400">(${count})</span>
                </li>
            `).join("");
        }

        function renderBusinessCard(item) {
            const addressParts = [item.address, item.ward, item.district, item.city].filter(Boolean);
            const fullAddress = addressParts.join(", ") || "Đang cập nhật địa chỉ";
            const websiteText = item.website || "Đang cập nhật website";
            const phoneText = item.phone || "Đang cập nhật số điện thoại";
            const phoneLink = normalizePhone(item.phone);
            const description = item.description || "Doanh nghiệp đang hoạt động trên hệ thống ToamViet và có dữ liệu đăng tin liên quan.";
            const logoHtml = item.logoUrl
                ? `<img src="${escapeHtml(item.logoUrl)}" class="business-logo" alt="${escapeHtml(item.name)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                   <div class="business-avatar" style="display:none;">${escapeHtml(item.avatarText)}</div>`
                : `<div class="business-avatar">${escapeHtml(item.avatarText)}</div>`;

            return `
                <div class="business-card">
                    <div class="shrink-0">
                        ${logoHtml}
                    </div>

                    <div class="flex-1 min-w-0">
                        <a href="${item.profileUrl}" class="business-title block">
                            ${escapeHtml(item.name)}
                        </a>

                        <div class="mt-3 space-y-2">
                            <div class="meta-line">
                                <i class="fa-solid fa-location-dot"></i>
                                <span>${escapeHtml(fullAddress)}</span>
                            </div>

                            <div class="meta-line">
                                <i class="fa-solid fa-phone"></i>
                                <span>
                                    ${
                                        phoneLink
                                            ? `<a href="tel:${phoneLink}" class="hover:text-[--vip-color]">${escapeHtml(phoneText)}</a>`
                                            : escapeHtml(phoneText)
                                    }
                                </span>
                            </div>

                            <div class="meta-line">
                                <i class="fa-solid fa-globe"></i>
                                <span>${escapeHtml(websiteText)}</span>
                            </div>
                        </div>

                        <p class="mt-4 text-sm text-slate-500 leading-7">
                            ${escapeHtml(description)}
                        </p>

                        <div class="mt-4 flex flex-wrap gap-2">
                            ${getCompanyTypeChip(item.type)}
                            <span class="chip gray"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.roleLabel || "Doanh nghiệp")}</span>
                            ${(item.fields || []).map(field => `<span class="chip green">${escapeHtml(field)}</span>`).join("")}
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mt-5">
                            <div class="stat-box">
                                <div class="stat-label">Tổng tin</div>
                                <div class="stat-value">${item.totalPosts || 0}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Đã duyệt</div>
                                <div class="stat-value">${item.approvedPosts || 0}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Khu vực</div>
                                <div class="stat-value">${escapeHtml(item.city || "Chưa rõ")}</div>
                            </div>
                        </div>

                        <div class="mt-5 flex flex-wrap gap-3">
                            <a href="${item.profileUrl}" class="inline-flex items-center gap-2 bg-[--vip-color] text-white px-4 py-2 rounded-xl font-bold text-sm hover:opacity-90 transition">
                                <i class="fa-solid fa-building"></i>
                                Xem hồ sơ
                            </a>

                            ${
                                phoneLink
                                    ? `<a href="tel:${phoneLink}" class="inline-flex items-center gap-2 border border-[--vip-color] text-[--vip-color] px-4 py-2 rounded-xl font-bold text-sm hover:bg-[--vip-color] hover:text-white transition">
                                            <i class="fa-solid fa-phone"></i>
                                            Liên hệ
                                       </a>`
                                    : ""
                            }
                        </div>
                    </div>
                </div>
            `;
        }

        function updateTabStyles() {
            filterTabs.forEach(tab => {
                const isActive = tab.dataset.type === currentTypeFilter;
                tab.className = isActive
                    ? "filter-tab bg-[--vip-color] text-white px-4 py-2 rounded-lg text-sm font-bold"
                    : "filter-tab bg-white border px-4 py-2 rounded-lg text-sm font-semibold hover:border-[--vip-color]";
            });
        }

        function renderBusinesses() {
            let data = getBusinessData();

            const usingFallback = !extractUsersRaw().some(Boolean) && !extractAllPosts().length;
            if (usingFallback) {
                dataNote.classList.remove("hidden");
                dataNote.innerHTML = `
                    Hiện tại hệ thống chưa có dữ liệu doanh nghiệp thật để hiển thị ngoài public.
                    Trang đang dùng <strong>dữ liệu mẫu</strong> để bạn kiểm tra giao diện.
                    Khi có tài khoản doanh nghiệp đăng ký hoặc phát sinh tin đăng mang thương hiệu doanh nghiệp, dữ liệu sẽ tự động xuất hiện tại đây.
                `;
            } else {
                dataNote.classList.add("hidden");
                dataNote.innerHTML = "";
            }

            fillCityFilter(data);
            renderFieldStats(data);

            const filtered = applyFilters(data);
            resultCount.textContent = filtered.length;

            if (!filtered.length) {
                businessList.innerHTML = `
                    <div class="empty-box">
                        Không tìm thấy doanh nghiệp phù hợp với bộ lọc hiện tại.
                        Bạn hãy thử đổi từ khóa hoặc tỉnh thành để tìm lại.
                    </div>
                `;
                return;
            }

            businessList.innerHTML = filtered.map(renderBusinessCard).join("");
        }

        applyFilterBtn.addEventListener("click", renderBusinesses);

        keywordFilter.addEventListener("keydown", function (event) {
            if (event.key === "Enter") renderBusinesses();
        });

        cityFilter.addEventListener("change", renderBusinesses);

        filterTabs.forEach(tab => {
            tab.addEventListener("click", function () {
                currentTypeFilter = this.dataset.type || "";
                updateTabStyles();
                renderBusinesses();
            });
        });

        updateTabStyles();
        window.addEventListener("load", renderBusinesses);
    </script>

    <script src="../assets/js/main.js"></script>
</body>
</html>
