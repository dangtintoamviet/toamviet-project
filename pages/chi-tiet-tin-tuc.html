    <style>
        :root {
            --vip-color: #008b8b;
            --vip-dark: #0f766e;
            --hover-color: #ff8c00;
            --soft-bg: #f8fafc;
            --border-color: #e5e7eb;
            --text-main: #0f172a;
            --text-soft: #64748b;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: "Roboto", sans-serif;
            background: var(--soft-bg);
            color: var(--text-main);
        }

        a {
            text-decoration: none;
        }

        .news-page-shell {
            padding-top: 24px;
            padding-bottom: 32px;
        }

        .breadcrumb-wrap {
            margin-bottom: 18px;
        }

        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 14px;
            color: #64748b;
            line-height: 1.7;
        }

        .breadcrumb a {
            color: #64748b;
            transition: color 0.2s ease;
        }

        .breadcrumb a:hover {
            color: var(--vip-color);
        }

        .news-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 24px;
            align-items: start;
        }

        .article-shell,
        .side-card,
        .empty-box {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
        }

        .article-shell {
            overflow: hidden;
        }

        .article-hero {
            position: relative;
            min-height: 430px;
            background: #dbe4ea;
        }

        .article-hero img {
            width: 100%;
            height: 100%;
            min-height: 430px;
            object-fit: cover;
            display: block;
        }

        .article-hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.12) 0%, rgba(15, 23, 42, 0.22) 35%, rgba(15, 23, 42, 0.74) 100%);
        }

        .article-hero-content {
            position: absolute;
            left: 28px;
            right: 28px;
            bottom: 26px;
            z-index: 2;
            color: #fff;
            max-width: 860px;
        }

        .article-badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .article-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .article-badge.category {
            background: linear-gradient(135deg, rgba(0,139,139,0.96), rgba(15,118,110,0.92));
            color: #fff;
        }

        .article-badge.meta {
            background: rgba(255,255,255,0.94);
            color: var(--vip-color);
        }

        .article-title {
            margin: 0 0 14px;
            font-size: clamp(24px, 3vw, 34px);
            line-height: 1.25;
            font-weight: 800;
            color: #fff;
            text-transform: none;
            text-shadow: 0 4px 20px rgba(0,0,0,0.22);
        }

        .article-excerpt {
            margin: 0;
            font-size: 15px;
            line-height: 1.85;
            color: rgba(255,255,255,0.92);
        }

        .article-body-wrap {
            padding: 24px;
        }

        .article-meta-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .article-meta-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            font-weight: 700;
            color: #334155;
        }

        .article-meta-item i {
            color: var(--vip-color);
        }

        .article-content {
            font-size: 15px;
            line-height: 1.9;
            color: #475569;
        }

        .article-content p {
            margin: 0 0 16px;
        }

        .article-content p:last-child {
            margin-bottom: 0;
        }

        .article-content h2,
        .article-content h3 {
            margin: 26px 0 12px;
            color: var(--text-main);
            line-height: 1.4;
            font-weight: 800;
            text-transform: none;
        }

        .article-content h2 {
            font-size: 22px;
        }

        .article-content h3 {
            font-size: 18px;
        }

        .article-content ul {
            margin: 0 0 16px 20px;
            padding: 0;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eef2f7;
        }

        .article-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 8px 13px;
            border-radius: 999px;
            background: #f8ffff;
            border: 1px solid #dbe4ee;
            color: var(--vip-color);
            font-size: 12px;
            font-weight: 800;
        }

        .side-card {
            padding: 20px;
        }

        .side-title {
            margin: 0 0 14px;
            font-size: 20px;
            line-height: 1.35;
            font-weight: 800;
            color: var(--text-main);
            text-transform: none;
        }

        .side-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .side-news-item {
            display: grid;
            grid-template-columns: 92px minmax(0, 1fr);
            gap: 12px;
            color: inherit;
            padding-bottom: 16px;
            border-bottom: 1px dashed #dbe4ee;
        }

        .side-news-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .side-news-thumb {
            width: 92px;
            height: 78px;
            border-radius: 14px;
            overflow: hidden;
            background: #e5e7eb;
        }

        .side-news-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .side-news-title {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.6;
            color: #0f172a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-transform: none;
        }

        .side-news-item:hover .side-news-title {
            color: var(--vip-color);
        }

        .side-news-meta {
            font-size: 12px;
            color: #64748b;
            line-height: 1.6;
        }

        .quick-info-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .quick-info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px dashed #dbe4ee;
        }

        .quick-info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .quick-info-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0,139,139,0.10);
            color: var(--vip-color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 17px;
        }

        .quick-info-label {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.55;
            margin-bottom: 4px;
        }

        .quick-info-value {
            font-size: 13px;
            color: #64748b;
            line-height: 1.7;
        }

        .seo-shell {
            margin-top: 26px;
        }

        .empty-box {
            padding: 20px;
            border-style: dashed;
            color: #64748b;
            font-size: 14px;
            line-height: 1.8;
        }

        @media (max-width: 1200px) {

            }

            .article-hero img {

            }

            .article-hero-content {

                right: 16px;
                bottom: 16px;
            }

            .article-title {
                font-size: 21px;
                margin-bottom: 10px;
            }

            .article-excerpt {
                font-size: 13px;
                line-height: 1.75;
            }

            .article-badge-row {
                gap: 8px;
            }

            .article-badge {
                font-size: 10px;
                padding: 7px 10px;
                min-height: 30px;
            }

            .article-body-wrap,
            .side-card {
                padding: 16px;
            }

            .article-meta-bar {
                gap: 10px;
                margin-bottom: 16px;
            }

            .article-meta-item {
                font-size: 12px;
                min-height: 34px;
                padding: 7px 12px;
            }

            .article-content {
                font-size: 14px;
                line-height: 1.85;
            }

            .article-content h2 {
                font-size: 19px;
            }

            .article-content h3 {
                font-size: 17px;
            }

            .side-title {
                font-size: 18px;
            }
        }
    </style>
</head>

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function normalizeText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .toLowerCase()
                .replace(/\s+/g, " ")
                .trim();
        }

        function slugifyText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, "")
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-");
        }

        function getQueryParam(key) {
            const url = new URL(window.location.href);
            return url.searchParams.get(key) || "";
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) return "Đang cập nhật";
            return date.toLocaleDateString("vi-VN");
        }

        function getArticleByParam() {
            const slug = getQueryParam("slug");
            const id = getQueryParam("id");

            if (slug) {
                const bySlug = fallbackNews.find(item => normalizeText(item.slug) === normalizeText(slug));
                if (bySlug) return bySlug;
            }

            if (id) {
                const byId = fallbackNews.find(item => String(item.id) === String(id));
                if (byId) return byId;

                const byNameSlug = fallbackNews.find(item => slugifyText(item.title) === slugifyText(id));
                if (byNameSlug) return byNameSlug;
            }

            return fallbackNews[0] || null;
        }

        function renderHero(article) {
            document.title = `${article.title} | ToamViet.com.vn`;
            document.getElementById("breadcrumbTitle").textContent = article.title;
            document.getElementById("heroImage").src = article.image || FALLBACK_IMAGE;
            document.getElementById("heroImage").alt = article.title;
            document.getElementById("heroCategoryBadge").innerHTML = `<i class="fa-solid fa-newspaper"></i>${escapeHtml(article.category || "Tin tức")}`;
            document.getElementById("heroDateBadge").innerHTML = `<i class="fa-regular fa-clock"></i>${escapeHtml(formatDate(article.date))}`;
            document.getElementById("articleTitle").textContent = article.title;
            document.getElementById("articleExcerpt").textContent = article.excerpt || "Nội dung đang được cập nhật.";
            document.getElementById("articleAuthor").textContent = article.author || "Ban biên tập ToamViet";
            document.getElementById("articleCategory").textContent = article.category || "Tin tức";
        }

        function renderContent(article) {
            const paragraphs = Array.isArray(article.content) ? article.content : [article.content || "Nội dung đang được cập nhật."];
            document.getElementById("articleContent").innerHTML = paragraphs
                .map(paragraph => `<p>${escapeHtml(paragraph)}</p>`)
                .join("");

            const tags = Array.isArray(article.tags) ? article.tags : [];
            document.getElementById("articleTags").innerHTML = tags.length
                ? tags.map(tag => `<span class="article-tag"><i class="fa-solid fa-hashtag"></i>${escapeHtml(tag)}</span>`).join("")
                : `<span class="article-tag"><i class="fa-solid fa-hashtag"></i>Tin tức</span>`;
        }

        function renderQuickInfo(article) {
            const infoItems = [
                {
                    icon: "fa-regular fa-calendar",
                    label: "Ngày đăng",
                    value: formatDate(article.date)
                },
                {
                    icon: "fa-regular fa-user",
                    label: "Tác giả",
                    value: article.author || "Ban biên tập ToamViet"
                },
                {
                    icon: "fa-regular fa-folder-open",
                    label: "Chuyên mục",
                    value: article.category || "Tin tức"
                }
            ];

            document.getElementById("quickInfoList").innerHTML = infoItems.map(item => `
                <div class="quick-info-item">
                    <div class="quick-info-icon"><i class="${item.icon}"></i></div>
                    <div>
                        <div class="quick-info-label">${escapeHtml(item.label)}</div>
                        <div class="quick-info-value">${escapeHtml(item.value)}</div>
                    </div>
                </div>
            `).join("");
        }

        function renderRelatedNews(article) {
            const related = fallbackNews.filter(item => item.id !== article.id).slice(0, 4);
            const container = document.getElementById("relatedNewsList");

            if (!related.length) {
                container.innerHTML = `<div class="empty-box">Chưa có tin tức liên quan để hiển thị.</div>`;
                return;
            }

            container.innerHTML = related.map(item => `
                <a href="../pages/chi-tiet-tin-tuc.html?slug=${encodeURIComponent(item.slug || item.id)}" class="side-news-item">
                    <div class="side-news-thumb">
                        <img
                            src="${escapeHtml(item.image || FALLBACK_IMAGE)}"
                            alt="${escapeHtml(item.title)}"
                            loading="lazy"
                            onerror="this.onerror=null;this.src='../assets/images/fallback-property.jpg'"
                        />
                    </div>
                    <div class="min-w-0">
                        <h4 class="side-news-title">${escapeHtml(item.title)}</h4>
                        <div class="side-news-meta">${escapeHtml(item.category || "Tin tức")} • ${escapeHtml(formatDate(item.date))}</div>
                    </div>
                </a>
            `).join("");
        }

        function renderSeoFallback() {
            const seoContainer = document.getElementById("seoContent");
            if (!seoContainer || !currentArticle) return;

            seoContainer.innerHTML = `
                <div class="seo-wrapper">
                    <div class="seo-text collapsed" id="seoContent-text">
                        <p>Bài viết ${escapeHtml(currentArticle.title)} trên ToamViet giúp mở rộng lớp nội dung tin tức cho website, đồng thời hỗ trợ người dùng theo dõi nhanh các thông tin liên quan đến thị trường, doanh nghiệp, môi giới, dự án hoặc các nhóm dịch vụ đi kèm.</p>
                        <p>Với các trang chi tiết tin tức như thế này, website có thể tăng độ phủ từ khóa dài theo từng chủ đề cụ thể, đồng thời tạo thêm các điểm liên kết nội bộ về trang danh mục tin tức, chi tiết dự án, danh bạ và các trang phân tích dữ liệu khác.</p>
                        <p>Trong quá trình phát triển tiếp theo, mỗi bài viết nên được tối ưu thêm về ảnh đại diện, nhóm tag chủ đề, tin liên quan và mô tả ngắn để tăng khả năng giữ chân người đọc cũng như hỗ trợ SEO tổng thể tốt hơn.</p>
                    </div>
                    <button
                        type="button"
                        class="seo-toggle-btn"
                        id="seoContent-toggle"
                        aria-expanded="false"
                    >
                        <span class="seo-toggle-label">Xem thêm</span>
                        <i class="fa-solid fa-chevron-down seo-toggle-icon"></i>
                    </button>
                </div>
            `;

            const toggleBtn = document.getElementById("seoContent-toggle");
            const seoText = document.getElementById("seoContent-text");
            const toggleLabel = toggleBtn ? toggleBtn.querySelector(".seo-toggle-label") : null;

            if (!toggleBtn || !seoText || !toggleLabel) return;

            toggleBtn.addEventListener("click", () => {
                const isCollapsed = seoText.classList.contains("collapsed");

                if (isCollapsed) {
                    seoText.classList.remove("collapsed");
                    toggleBtn.classList.add("expanded");
                    toggleBtn.setAttribute("aria-expanded", "true");
                    toggleLabel.textContent = "Thu gọn";
                } else {
                    seoText.classList.add("collapsed");
                    toggleBtn.classList.remove("expanded");
                    toggleBtn.setAttribute("aria-expanded", "false");
                    toggleLabel.textContent = "Xem thêm";
                }
            });
        }

        async function initSharedComponents() {
            try {
                if (typeof loadComponent === "function") {
                    await loadComponent("site-header", "../components/header-inner.html");
                    await loadComponent("site-mobile-menu", "../components/mobile-menu-inner.html");
                    await loadComponent("site-footer", "../components/footer-inner.html");

                    if (typeof setupFixedHeaderSpacing === "function") {
                        setupFixedHeaderSpacing();
                    }
                    if (typeof watchHeaderSpacing === "function") {
                        watchHeaderSpacing();
                    }
                }
            } catch (error) {
                console.error("Không thể load component dùng chung:", error);
            }
        }

        function safeScrollToTop() {
            if (typeof window.scrollToTop === "function") {
                window.scrollToTop();
            } else {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function safeToggleForm() {
            if (typeof window.toggleForm === "function") {
                window.toggleForm();
            } else {
                const chatForm = document.getElementById("chatForm");
                if (!chatForm) return;
                chatForm.style.display = chatForm.style.display === "block" ? "none" : "block";
            }
        }

        function sendToZalo() {
            const name = document.getElementById("cusName").value.trim();
            const msg = document.getElementById("cusMsg").value.trim();
            const phone = "0946239289";

            if (!name) {
                alert("Vui lòng cho biết tên của bạn");
                return;
            }

            const fullMsg = "Chào admin Tổ Ấm Việt, tôi là " + name + ". " + msg;
            const encodedMsg = encodeURIComponent(fullMsg);
            window.open("https://zalo.me/" + phone + "?text=" + encodedMsg, "_blank");
        }

        async function initPage() {
            await initSharedComponents();

            const article = getArticleByParam();

            if (!article) {
                document.querySelector(".news-page-shell").innerHTML = `
                    <div class="empty-box">
                        Không tìm thấy nội dung tin tức để hiển thị.
                    </div>
                `;
                return;
            }

            currentArticle = article;

            renderHero(article);
            renderContent(article);
            renderQuickInfo(article);
            renderRelatedNews(article);

            if (typeof renderSeoContent === "function" && typeof getSeoContentByKey === "function") {
                const keyBySlug = `news-${article.slug || ""}`;
                const externalContent = getSeoContentByKey(keyBySlug) || getSeoContentByKey("news-detail") || getSeoContentByKey("news");
                if (externalContent) {
                    renderSeoContent("seoContent", getSeoContentByKey(keyBySlug) ? keyBySlug : (getSeoContentByKey("news-detail") ? "news-detail" : "news"));
                } else {
                    renderSeoFallback();
                }
            } else {
                renderSeoFallback();
            }
        }

        window.addEventListener("load", initPage);
    </script>
</body>
</html>
