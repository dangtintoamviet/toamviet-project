<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dự án Bất động sản - ToamViet.com.vn</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />

    <style>
        :root { --vip-color: #008B8B; --hover-color: #FF8C00; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            color: #2C2C2C;
        }

        .container-custom {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .nav-link { transition: all 0.3s; position: relative; }
        .nav-link:hover { color: var(--hover-color) !important; }

        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-width: 200px;
            border-top: 2px solid var(--vip-color);
            z-index: 50;
        }

        .dropdown-item {
            padding: 10px 20px;
            display: block;
            color: #333;
            font-size: 14px;
            border-bottom: 1px solid #f2f2f2;
        }

        .dropdown-item:hover {
            background: #f9f9f9;
            color: var(--hover-color);
        }

        .project-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
            transition: 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            border-color: var(--vip-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .project-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-metric {
            display: flex;
            gap: 12px;
            font-size: 14px;
            margin-top: 4px;
            color: #c0392b; /* màu đỏ cam chủ đạo */
        }

        /* Fix spacing khi dùng component header/footer chung */
        #site-header, #site-mobile-menu { margin:0; padding:0; }
        #site-mobile-menu:empty { display:none; }
        .project-page-hero { margin-top:0; }
        .project-page-main { padding-top:34px; }
        @media (max-width:768px) { .project-page-main { padding-top:24px; } }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="site-mobile-menu"></div>

    <div class="relative project-page-hero">
        <div class="swiper mySwiper w-full h-[300px] md:h-[450px]">
            <div class="swiper-wrapper" id="hero-slider-wrapper">
                <!-- Slide được render bằng JS -->
            </div>
            <div class="swiper-pagination !bottom-16"></div>
        </div>

        <div class="bg-white border-b shadow-sm relative z-10">
            <div class="container-custom py-4">
                <div class="flex flex-wrap lg:flex-nowrap gap-3 items-center">
                    <div class="flex-1 min-w-[200px] relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                        <input id="keywordFilter" type="text" placeholder="Tìm kiếm dự án..." class="project-filter-input w-full pl-10 pr-4 py-2" />
                    </div>

                    <div class="flex gap-2 w-full lg:w-auto overflow-x-auto pb-1 lg:pb-0">
                        <select id="cityFilter" class="filter-item project-filter-select min-w-[120px]">
                            <option value="">Khu vực</option>
                        </select>
                        <select id="typeFilter" class="filter-item project-filter-select min-w-[120px]">
                            <option value="">Loại hình</option>
                        </select>
                        <select id="sortFilter" class="filter-item project-filter-select min-w-[120px]">
                            <option value="newest">Mới cập nhật</option>
                            <option value="post-desc">Nhiều tin nhất</option>
                            <option value="price-desc">Giá cao</option>
                            <option value="price-asc">Giá thấp</option>
                        </select>
                    </div>

                    <button id="resetFilterBtn" class="bg-gray-100 p-2.5 rounded-md hover:bg-gray-200 transition">
                        <i class="fa-solid fa-rotate-right text-gray-600"></i>
                    </button>
                    <button id="applyFilterBtn" class="bg-[--vip-color] text-white px-8 py-2 rounded-md font-bold hover:opacity-90 transition w-full lg:w-auto">
                        TÌM KIẾM
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="container-custom py-10 project-page-main">
        <div id="data-note" class="empty-box mb-6 hidden"></div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex-1">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold uppercase border-l-4 border-[--vip-color] pl-3">Dự án bất động sản trên toàn quốc</h1>
                    <p class="text-gray-500 text-sm mt-1 ml-4 italic">
                        Hiện có <span id="project-count">0</span> dự án đang có dữ liệu mua bán & cho thuê
                    </p>
                </div>

                <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>

            <aside class="lg:w-[300px] flex flex-col gap-6">
                <div class="bg-white rounded-lg border border-gray-200 p-5 shadow-sm">
                    <h4 class="font-bold text-sm border-b-2 border-[--vip-color] pb-2 mb-4 uppercase">Dự án theo tỉnh thành</h4>
                    <ul id="project-city-list" class="space-y-3 text-[13px]"></ul>
                </div>
            </aside>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../assets/js/user-storage.js"></script>
    <script src="../assets/js/post-storage.js"></script>
    <script src="../assets/js/project-service.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        const keywordFilter = document.getElementById('keywordFilter');
        const cityFilter = document.getElementById('cityFilter');
        const typeFilter = document.getElementById('typeFilter');
        const sortFilter = document.getElementById('sortFilter');
        const applyFilterBtn = document.getElementById('applyFilterBtn');
        const resetFilterBtn = document.getElementById('resetFilterBtn');

        const dataNote = document.getElementById('data-note');
        const projectGrid = document.getElementById('project-grid');
        const projectCount = document.getElementById('project-count');
        const projectCityList = document.getElementById('project-city-list');
        const heroSliderWrapper = document.getElementById('hero-slider-wrapper');

        let currentProjects = [];
        let heroSwiper = null;

        function renderProjectCard(project) {
            const avgPrice = project.averageSalePricePerSquareMeter ? 
                new Intl.NumberFormat('vi-VN').format(project.averageSalePricePerSquareMeter/1000000) + ' triệu/m²' :
                'Đang cập nhật';
            const location = [project.ward, project.city].filter(Boolean).join(', ') || 'Đang cập nhật khu vực';
            const developer = project.developer || 'Đang cập nhật chủ đầu tư';
            const type = project.type || 'Đang cập nhật loại hình';
            const badge = project.isDemo
                ? '<span class="metric-chip demo"><i class="fa-solid fa-flask"></i> Demo</span>'
                : ((project.postCount || 0) >= 10
                    ? '<span class="metric-chip hot"><i class="fa-solid fa-fire"></i> HOT</span>'
                    : '<span class="metric-chip primary"><i class="fa-solid fa-chart-column"></i> Đang có dữ liệu</span>');

            const totalAreaText = project.totalArea ? '· Diện tích: ' + project.totalArea : '· Diện tích: Đang cập nhật';

            return `
                <div class="project-card">
                    <div class="relative h-48">
                        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500" alt="${project.name}" class="w-full h-full object-cover">
                        <span class="absolute bottom-2 left-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded flex items-center gap-1">
                            <i class="fa-solid fa-file-lines"></i> ${project.postCount || 0} tin
                        </span>
                        <div class="absolute top-2 right-2">${badge}</div>
                    </div>

                    <div class="p-4 flex-1 flex flex-col">
                        <a href="../pages/chi-tiet-du-an.html?slug=${project.slug}">
                            <h3 class="project-title font-bold text-[14px] uppercase hover:text-[--vip-color] cursor-pointer">${project.name}</h3>
                        </a>

                        <p class="text-red-600 font-bold text-lg mt-2">
                            ${avgPrice} <span class="text-gray-400 font-normal text-sm">${totalAreaText}</span>
                        </p>

                        <div class="flex items-center gap-2 mt-2 text-gray-500 text-[12px]">
                            <i class="fa-solid fa-location-dot"></i>
                            <span>${location}</span>
                        </div>

                        <div class="mt-3 text-[12px] text-slate-500 space-y-1">
                            <div><strong class="text-slate-700">Loại hình:</strong> ${type}</div>
                            <div><strong class="text-slate-700">Chủ đầu tư:</strong> ${developer}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getProjectsData() {
            // Lấy dự án từ service, nếu không có thì dùng fallback
            if (window.projectService && typeof window.projectService.getPublicProjects === 'function') {
                const allPosts = window.postStorage ? window.postStorage.getAllPosts() : [];
                projectService.syncProjectCounts(allPosts, true);
                return projectService.getPublicProjects().map(p => ({ ...p, isDemo:false }));
            }
            // fallback demo
            return [
                { name: 'Tổ Ấm Việt Riverside', slug:'to-am-viet-riverside', city:'Hà Nội', ward:'Phường Cầu Giấy', type:'Căn hộ', developer:'Tổ Ấm Việt Development', postCount:12, saleCount:8, rentalCount:4, averageSalePricePerSquareMeter:72000000, totalArea:'3.2 ha', isDemo:true },
                { name: 'Hồng Hạc City', slug:'hong-hac-city', city:'Bắc Ninh', ward:'Thuận Thành', type:'Khu đô thị', developer:'Hồng Hạc Land', postCount:9, saleCount:7, rentalCount:2, averageSalePricePerSquareMeter:48000000, totalArea:'1.5 ha', isDemo:true }
            ];
        }

        function renderProjects() {
            currentProjects = getProjectsData();

            // Filter theo bộ lọc
            let filtered = [...currentProjects];
            const keyword = keywordFilter.value.toLowerCase();
            const city = cityFilter.value;
            const type = typeFilter.value;

            if (keyword) filtered = filtered.filter(p => (p.name||'').toLowerCase().includes(keyword));
            if (city) filtered = filtered.filter(p => p.city===city);
            if (type) filtered = filtered.filter(p => p.type===type);

            projectCount.textContent = filtered.length;

            if (!filtered.length) {
                projectGrid.innerHTML = `<div class="md:col-span-2 empty-box">Không tìm thấy dự án phù hợp.</div>`;
                return;
            }

            projectGrid.innerHTML = filtered.map(renderProjectCard).join('');
        }

        function fillFilters() {
            const projects = currentProjects;
            const cities = [...new Set(projects.map(p=>p.city).filter(Boolean))];
            const types = [...new Set(projects.map(p=>p.type).filter(Boolean))];
            cityFilter.innerHTML = '<option value="">Khu vực</option>' + cities.map(c=>`<option value="${c}">${c}</option>`).join('');
            typeFilter.innerHTML = '<option value="">Loại hình</option>' + types.map(t=>`<option value="${t}">${t}</option>`).join('');
        }

        applyFilterBtn.addEventListener('click', renderProjects);
        resetFilterBtn.addEventListener('click', ()=>{
            keywordFilter.value=''; cityFilter.value=''; typeFilter.value='';
            renderProjects();
        });
        keywordFilter.addEventListener('keydown', e=>{if(e.key==='Enter') renderProjects();});
        cityFilter.addEventListener('change', renderProjects);
        typeFilter.addEventListener('change', renderProjects);

        // Khởi tạo
        currentProjects = getProjectsData();
        fillFilters();
        renderProjects();
    </script>
</body>
</html>
