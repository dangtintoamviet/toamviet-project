<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="../assets/js/user-storage.js"></script>
<script src="../assets/js/post-storage.js"></script>
<script src="../assets/js/project-service.js"></script>

<script>
    const keywordFilter = document.getElementById('keywordFilter');
    const cityFilter = document.getElementById('cityFilter');
    const typeFilter = document.getElementById('typeFilter');
    const sortFilter = document.getElementById('sortFilter');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');

    const dataNote = document.getElementById('data-note');
    const projectGrid = document.getElementById('project-grid');
    const projectCount = document.getElementById('project-count');
    const projectCityList = document.getElementById('project-city-list');
    const heroSliderWrapper = document.getElementById('hero-slider-wrapper');

    const fallbackProjects = [
        {
            id: 'project_to-am-viet-riverside',
            name: 'Tổ Ấm Việt Riverside',
            slug: 'to-am-viet-riverside',
            city: 'Hà Nội',
            ward: 'Phường Cầu Giấy',
            type: 'Căn hộ',
            developer: 'Tổ Ấm Việt Development',
            postCount: 12,
            saleCount: 8,
            rentalCount: 4,
            averageSalePricePerSquareMeter: 72000000,
            createdAt: '2026-01-01T08:00:00.000Z',
            updatedAt: '2026-01-08T08:00:00.000Z',
            isDemo: true
        },
        {
            id: 'project_hong-hac-city',
            name: 'Hồng Hạc City',
            slug: 'hong-hac-city',
            city: 'Bắc Ninh',
            ward: 'Thuận Thành',
            type: 'Khu đô thị',
            developer: 'Hồng Hạc Land',
            postCount: 9,
            saleCount: 7,
            rentalCount: 2,
            averageSalePricePerSquareMeter: 48000000,
            createdAt: '2026-01-02T08:00:00.000Z',
            updatedAt: '2026-01-08T08:00:00.000Z',
            isDemo: true
        },
        {
            id: 'project_saigon-river-view',
            name: 'Saigon River View',
            slug: 'saigon-river-view',
            city: 'TP.HCM',
            ward: 'Phường Thủ Thiêm',
            type: 'Căn hộ',
            developer: 'Saigon Urban Holdings',
            postCount: 15,
            saleCount: 10,
            rentalCount: 5,
            averageSalePricePerSquareMeter: 95000000,
            createdAt: '2026-01-03T08:00:00.000Z',
            updatedAt: '2026-01-08T08:00:00.000Z',
            isDemo: true
        }
    ];

    let currentProjects = [];
    let heroSwiper = null;

    function initSwiper() {
        if (heroSwiper) {
            heroSwiper.destroy(true, true);
            heroSwiper = null;
        }

        if (document.querySelector(".mySwiper")) {
            heroSwiper = new Swiper(".mySwiper", {
                loop: true,
                autoplay: { delay: 5000 },
                pagination: { el: ".swiper-pagination", clickable: true }
            });
        }
    }

    function sendToZalo() {
        const name = document.getElementById("cusName").value;
        const msg = document.getElementById("cusMsg").value;
        const phone = "0946239289";

        if (!name) {
            alert("Vui lòng cho biết tên của bạn");
            return;
        }

        const fullMsg = "Chào admin Tổ Ấm Việt, tôi là " + name + ". " + msg;
        const encodedMsg = encodeURIComponent(fullMsg);
        window.open("https://zalo.me/" + phone + "?text=" + encodedMsg, "_blank");
    }

    function formatPricePerSquareMeter(value) {
        if (!Number.isFinite(value) || value <= 0) return "Chưa có dữ liệu";

        if (value >= 1000000000) return (value / 1000000000).toFixed(2) + " tỷ/m²";
        if (value >= 1000000) return Math.round(value / 1000000) + " triệu/m²";
        return Math.round(value).toLocaleString("vi-VN") + " đ/m²";
    }

    function getApprovedProjects() {
        if (window.projectService && typeof window.projectService.getPublicProjects === 'function') {
            const allPosts = window.postStorage ? window.postStorage.getAllPosts() : [];
            projectService.syncProjectCounts(allPosts, true);

            return projectService.getPublicProjects().map(project => ({
                ...project,
                isDemo: false
            }));
        }

        return [];
    }

    function getProjectsData() {
        const projects = getApprovedProjects();

        if (projects.length) {
            dataNote.classList.add('hidden');
            dataNote.innerHTML = '';
            return projects;
        }

        dataNote.classList.remove('hidden');
        dataNote.innerHTML = `
            Hiện tại chưa có dự án thật nào có tin đã duyệt để hiển thị ngoài public.
            Tôi đang hiển thị dữ liệu mẫu để bạn dễ kiểm tra giao diện.
            Sau khi tin đăng thuộc dự án được admin duyệt, các dự án sẽ tự động xuất hiện ở đây.
        `;
        return fallbackProjects;
    }

    function fillFilters(projects) {
        const currentCity = cityFilter.value;
        const currentType = typeFilter.value;

        const uniqueCities = [...new Set(projects.map(item => item.city).filter(Boolean))];
        const uniqueTypes = [...new Set(projects.map(item => item.type).filter(Boolean))];

        cityFilter.innerHTML = '<option value="">Khu vực</option>' +
            uniqueCities.map(city => `<option value="${city}">${city}</option>`).join('');

        typeFilter.innerHTML = '<option value="">Loại hình</option>' +
            uniqueTypes.map(type => `<option value="${type}">${type}</option>`).join('');

        if (uniqueCities.includes(currentCity)) cityFilter.value = currentCity;
        if (uniqueTypes.includes(currentType)) typeFilter.value = currentType;
    }

    function applyFilters(projects) {
        let filtered = [...projects];

        const keyword = keywordFilter.value.trim().toLowerCase();
        const city = cityFilter.value;
        const type = typeFilter.value;
        const sortType = sortFilter.value;

        if (keyword) {
            filtered = filtered.filter(project =>
                (project.name || '').toLowerCase().includes(keyword) ||
                (project.city || '').toLowerCase().includes(keyword) ||
                (project.ward || '').toLowerCase().includes(keyword) ||
                (project.type || '').toLowerCase().includes(keyword) ||
                (project.developer || '').toLowerCase().includes(keyword)
            );
        }

        if (city) {
            filtered = filtered.filter(project => (project.city || '') === city);
        }

        if (type) {
            filtered = filtered.filter(project => (project.type || '') === type);
        }

        if (sortType === 'post-desc') {
            filtered.sort((a, b) => (b.postCount || 0) - (a.postCount || 0));
        } else if (sortType === 'price-desc') {
            filtered.sort((a, b) => (b.averageSalePricePerSquareMeter || 0) - (a.averageSalePricePerSquareMeter || 0));
        } else if (sortType === 'price-asc') {
            filtered.sort((a, b) => (a.averageSalePricePerSquareMeter || 0) - (b.averageSalePricePerSquareMeter || 0));
        } else {
            filtered.sort((a, b) => new Date(b.lastPostAt || b.updatedAt || b.createdAt || 0) - new Date(a.lastPostAt || a.updatedAt || a.createdAt || 0));
        }

        return filtered;
    }

    function renderProjectCityList(projects) {
        const cityCounter = {};

        projects.forEach(project => {
            const city = project.city || 'Khác';
            cityCounter[city] = (cityCounter[city] || 0) + 1;
        });

        const sorted = Object.entries(cityCounter)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8);

        if (!sorted.length) {
            projectCityList.innerHTML = `<li class="flex justify-between items-center text-[13px]"><span>Chưa có dữ liệu</span><span class="text-gray-400">(0)</span></li>`;
            return;
        }

        projectCityList.innerHTML = sorted.map(([city, count]) => `
            <li class="flex justify-between items-center text-[13px] hover:text-[--hover-color] cursor-pointer">
                <span>${city}</span>
                <span class="text-gray-400">(${count})</span>
            </li>
        `).join('');
    }

    function renderHeroProjects(projects) {
        const featured = projects.slice(0, 3);

        if (!featured.length) {
            heroSliderWrapper.innerHTML = `
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1200" alt="Dự án nổi bật" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-black/30 flex items-center">
                        <div class="container-custom w-full text-white">
                            <span class="bg-green-600 px-2 py-1 rounded text-[10px] font-bold uppercase">Dự án nổi bật</span>
                            <h2 class="text-3xl md:text-5xl font-bold mt-4">Khám phá các dự án đang được quan tâm</h2>
                            <p class="mt-2 opacity-90">Tổng hợp dự án có dữ liệu mua bán và cho thuê thực tế từ hệ thống</p>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        heroSliderWrapper.innerHTML = featured.map((project, index) => `
            <div class="swiper-slide relative">
                <img src="${index === 0
                    ? 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1200'
                    : index === 1
                        ? 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?w=1200'
                        : 'https://images.unsplash.com/photo-1494526585095-c41746248156?w=1200'
                }" alt="${project.name}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/30 flex items-center">
                    <div class="container-custom w-full text-white">
                        <span class="bg-green-600 px-2 py-1 rounded text-[10px] font-bold uppercase">
                            ${project.isDemo ? 'Dữ liệu mẫu' : 'Dự án nổi bật'}
                        </span>
                        <a href="../pages/chi-tiet-du-an.html?slug=${project.slug}" class="block">
                            <h2 class="text-3xl md:text-5xl font-bold mt-4 hover:text-[--hover-color] transition">${project.name}</h2>
                        </a>
                        <p class="mt-2 opacity-90">${[project.ward, project.city].filter(Boolean).join(', ') || 'Đang cập nhật khu vực'}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderProjectCard(project) {
        const avgPrice = formatPricePerSquareMeter(project.averageSalePricePerSquareMeter || 0);
        const location = [project.ward, project.city].filter(Boolean).join(', ') || 'Đang cập nhật khu vực';
        const developer = project.developer || 'Đang cập nhật chủ đầu tư';
        const type = project.type || 'Đang cập nhật loại hình';
        const badge = project.isDemo
            ? '<span class="metric-chip demo"><i class="fa-solid fa-flask"></i> Demo</span>'
            : ((project.postCount || 0) >= 10
                ? '<span class="metric-chip hot"><i class="fa-solid fa-fire"></i> HOT</span>'
                : '<span class="metric-chip primary"><i class="fa-solid fa-chart-column"></i> Đang có dữ liệu</span>');

        return `
            <div class="project-card">
                <div class="relative h-48">
                    <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500" alt="${project.name}" class="w-full h-full object-cover">
                    <span class="absolute bottom-2 left-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded flex items-center gap-1">
                        <i class="fa-solid fa-file-lines"></i> ${project.postCount || 0} tin
                    </span>
                    <div class="absolute top-2 right-2">${badge}</div>
                </div>

                <div class="p-4 flex-1 flex flex-col">
                    <a href="../pages/chi-tiet-du-an.html?slug=${project.slug}">
                        <h3 class="project-title font-bold text-[14px] uppercase hover:text-[--vip-color] cursor-pointer">${project.name}</h3>
                    </a>

                    <p class="text-red-600 font-bold text-lg mt-2">${avgPrice} <span class="text-gray-400 font-normal text-sm">trung bình</span></p>

                    <div class="flex items-center gap-2 mt-2 text-gray-500 text-[12px]">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>${location}</span>
                    </div>

                    <div class="mt-3 text-[12px] text-slate-500 space-y-1">
                        <div><strong class="text-slate-700">Loại hình:</strong> ${type}</div>
                        <div><strong class="text-slate-700">Chủ đầu tư:</strong> ${developer}</div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mt-4 text-center text-[11px]">
                        <div class="bg-slate-50 rounded-lg p-2">
                            <div class="font-bold text-slate-800">${project.postCount || 0}</div>
                            <div class="text-slate-500">Tổng tin</div>
                        </div>
                        <div class="bg-slate-50 rounded-lg p-2">
                            <div class="font-bold text-slate-800">${project.saleCount || 0}</div>
                            <div class="text-slate-500">Tin bán</div>
                        </div>
                        <div class="bg-slate-50 rounded-lg p-2">
                            <div class="font-bold text-slate-800">${project.rentalCount || 0}</div>
                            <div class="text-slate-500">Tin thuê</div>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t flex items-center justify-between">
                        <a href="../pages/danh-ba-doanh-nghiep.html" class="flex items-center gap-2 group">
                            <div class="w-10 h-10 rounded-full bg-[--vip-color] overflow-hidden border border-gray-100 text-white flex items-center justify-center text-xs font-bold">
                                ${(developer || 'TV').split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('') || 'TV'}
                            </div>
                            <div>
                                <p class="text-[12px] font-bold group-hover:text-[--hover-color]">${developer}</p>
                                <p class="text-[10px] text-gray-400">${project.isDemo ? 'Dữ liệu mẫu' : 'Dữ liệu thực từ hệ thống'}</p>
                            </div>
                        </a>
                        <button class="text-gray-400 hover:text-red-500 transition">
                            <i class="fa-regular fa-heart text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderProjects() {
        currentProjects = getProjectsData();
        fillFilters(currentProjects);

        const filteredProjects = applyFilters(currentProjects);

        renderHeroProjects(currentProjects);
        initSwiper();
        renderProjectCityList(currentProjects);

        projectCount.textContent = currentProjects.length;

        if (!filteredProjects.length) {
            projectGrid.innerHTML = `
                <div class="md:col-span-2 empty-box">
                    Không tìm thấy dự án nào phù hợp với bộ lọc hiện tại. Bạn thử đổi từ khóa, khu vực hoặc loại hình.
                </div>
            `;
            return;
        }

        projectGrid.innerHTML = filteredProjects.map(renderProjectCard).join('');
    }

    function resetFilters() {
        keywordFilter.value = '';
        cityFilter.value = '';
        typeFilter.value = '';
        sortFilter.value = 'newest';
        renderProjects();
    }

    applyFilterBtn.addEventListener('click', renderProjects);
    resetFilterBtn.addEventListener('click', resetFilters);
    keywordFilter.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') renderProjects();
    });
    cityFilter.addEventListener('change', renderProjects);
    typeFilter.addEventListener('change', renderProjects);
    sortFilter.addEventListener('change', renderProjects);

    renderProjects();
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
