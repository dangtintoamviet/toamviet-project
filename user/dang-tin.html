<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng tin bất động sản - ToamViet</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<link rel="stylesheet" href="../assets/css/main.css">

<script src="../assets/js/user-storage.js"></script>
<script src="../assets/js/post-storage.js"></script>

<script src="../assets/js/component-loader.js"></script>

<style>

body{
background:#f2f2f2;
font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

.container-custom{
max-width:1200px;
margin:auto;
padding:0 15px;
}

.form-box{
background:white;
border-radius:14px;
padding:25px;
border:1px solid #e5e7eb;
}

.label{
font-size:13px;
font-weight:700;
margin-bottom:5px;
display:block;
}

.input{
width:100%;
border:1px solid #d1d5db;
padding:10px 12px;
border-radius:8px;
font-size:14px;
}

.input:focus{
outline:none;
border-color:#008B8B;
box-shadow:0 0 0 3px rgba(0,139,139,0.08);
}

</style>

</head>

<body>

<div id="site-header"></div>

<div class="container-custom py-8">

<h1 class="text-xl font-bold mb-6">Đăng tin bất động sản</h1>

<div class="form-box">

<form id="postForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

<div>
<label class="label">Tiêu đề</label>
<input class="input" id="title" required>
</div>

<div>
<label class="label">Loại tin</label>

<select id="postType" class="input">

<option value="ban">Nhà đất bán</option>
<option value="thue">Nhà đất cho thuê</option>

</select>
</div>

<div>
<label class="label">Loại bất động sản</label>

<select id="propertyType" class="input">

<option>Căn hộ</option>
<option>Nhà phố</option>
<option>Đất nền</option>
<option>Biệt thự</option>
<option>Văn phòng</option>

</select>

</div>

<div>
<label class="label">Tỉnh / Thành</label>
<input class="input" id="city">
</div>

<div>
<label class="label">Quận / Huyện</label>
<input class="input" id="district">
</div>

<div>
<label class="label">Phường / Xã</label>
<input class="input" id="ward">
</div>

<div>
<label class="label">Giá</label>
<input class="input" id="price">
</div>

<div>
<label class="label">Diện tích (m²)</label>
<input class="input" id="area">
</div>

<div>
<label class="label">Số phòng ngủ</label>
<input class="input" id="beds">
</div>

<div>
<label class="label">Hướng</label>
<input class="input" id="direction">
</div>

<div>
<label class="label">Pháp lý</label>
<input class="input" id="legal">
</div>

<div>
<label class="label">VIP Level</label>

<select id="vipLevel" class="input">

<option value="thuong">Tin thường</option>
<option value="dong">VIP Đồng</option>
<option value="bac">VIP Bạc</option>
<option value="vang">VIP Vàng</option>
<option value="kim-cuong">VIP Kim cương</option>

</select>

</div>

<div class="md:col-span-2">

<label class="label">Mô tả</label>

<textarea id="description"
class="input"
rows="4"></textarea>

</div>

<div>

<label class="label">Tên người đăng</label>
<input id="contactName" class="input">

</div>

<div>

<label class="label">Số điện thoại</label>
<input id="contactPhone" class="input">

</div>

<div>

<label class="label">Loại tài khoản</label>

<select id="profileType" class="input">

<option value="canhan">Cá nhân</option>
<option value="doanhnghiep">Doanh nghiệp</option>

</select>

</div>

<div class="md:col-span-2">

<label class="label">Ảnh (URL)</label>

<input id="imageUrl"
class="input"
placeholder="https://...">

</div>

<div class="md:col-span-2">

<button type="submit"
class="bg-[#008B8B] text-white px-6 py-3 rounded font-bold">

Đăng tin

</button>

</div>

</form>

</div>

</div>

<div id="site-footer"></div>

<script>

document.getElementById("postForm").addEventListener("submit",function(e){

e.preventDefault();

const title=document.getElementById("title").value;

const postType=document.getElementById("postType").value;

const propertyType=document.getElementById("propertyType").value;

const city=document.getElementById("city").value;

const district=document.getElementById("district").value;

const ward=document.getElementById("ward").value;

const price=document.getElementById("price").value;

const area=document.getElementById("area").value;

const beds=document.getElementById("beds").value;

const direction=document.getElementById("direction").value;

const legal=document.getElementById("legal").value;

const description=document.getElementById("description").value;

const contactName=document.getElementById("contactName").value;

const contactPhone=document.getElementById("contactPhone").value;

const profileType=document.getElementById("profileType").value;

const vipLevel=document.getElementById("vipLevel").value;

const imageUrl=document.getElementById("imageUrl").value;

const id="post_"+Date.now();

const postData={

id,

flow:"real_estate",

postType,

title,

city,

district,

ward,

propertyType,

propertyPrice:price,

propertyArea:area,

propertyBeds:beds,

propertyDirection:direction,

propertyLegal:legal,

description,

contactName,

contactPhone,

profileType,

vipLevel,

images:imageUrl?[imageUrl]:[],

detailUrl:"../pages/chi-tiet-tin.html?id="+id,

contactProfileUrl:profileType==="doanhnghiep"
?"../pages/danh-ba-doanh-nghiep.html"
:"../pages/danh-ba-moi-gioi.html"

};

window.postStorage.createPost(postData);

alert("Tin đã được gửi duyệt");

location.reload();

});

</script>

<script src="../assets/js/main.js"></script>

</body>
</html>
