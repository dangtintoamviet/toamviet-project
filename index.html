<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToamViet.com.vn - Bất Động Sản Cao Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-vip { background-color: #008B8B; } /* Màu Lục lam sẫm chủ đạo */
        .text-vip { color: #008B8B; }
        .border-vip { border-color: #008B8B; }
        .btn-hover:hover { background-color: #007373; transition: 0.3s; }
        .hero-overlay { background: linear-gradient(0deg, rgba(0,139,139,0.4) 0%, rgba(0,0,0,0.2) 100%); }
    </style>
</head>
<body class="bg-[#F8FAFA]">

    <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1200px] mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-10">
                <a href="index.html">
                    <img src="DAI TRONG SUOT (1).png" alt="Logo ToamViet" class="h-12 object-contain">
                </a>
                <nav class="hidden lg:flex space-x-8 font-semibold text-gray-700">
                    <a href="index.html" class="text-vip">Trang chủ</a>
                    <a href="nha-dat-ban.html" class="hover:text-vip transition">Nhà đất bán</a>
                    <a href="#" class="hover:text-vip transition">Dự án</a>
                    <a href="#" class="hover:text-vip transition">Tin tức</a>
                </nav>
            </div>
            <button class="border-2 border-vip text-vip px-6 py-2 rounded-full font-bold hover:bg-vip hover:text-white transition">Đăng tin</button>
        </div>
    </header>

    <section class="relative h-[550px] flex items-center justify-center">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-overlay"></div>
        
        <div class="relative z-10 w-full max-w-[900px] px-4">
            <h1 class="text-white text-3xl md:text-5xl font-bold text-center mb-8 drop-shadow-lg">Tìm ngôi nhà mơ ước của bạn</h1>
            
            <div class="bg-white/95 backdrop-blur p-2 rounded-2xl shadow-2xl">
                <div class="flex flex-col md:flex-row items-center">
                    <input type="text" placeholder="Thành phố, Quận, Tên dự án..." class="w-full p-4 outline-none text-lg rounded-l-xl">
                    <div class="h-8 w-[1px] bg-gray-200 hidden md:block"></div>
                    <select class="w-full md:w-48 p-4 bg-transparent font-semibold text-gray-600 outline-none">
                        <option>Toàn quốc</option>
                    </select>
                    <button onclick="window.location.href='nha-dat-ban.html'" class="w-full md:w-auto bg-vip text-white px-10 py-4 rounded-xl font-bold text-lg btn-hover shadow-lg">
                        Tìm kiếm
                    </button>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-[1200px] mx-auto px-4 py-16">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Bất động sản dành cho bạn</h2>
                <div class="h-1.5 w-20 bg-vip mt-2"></div>
            </div>
            <a href="nha-dat-ban.html" class="text-vip font-bold hover:underline">Xem tất cả &raquo;</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition group cursor-pointer">
                <div class="relative overflow-hidden h-52">
                    <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-3 left-3 bg-vip text-white text-[11px] font-bold px-3 py-1 rounded-full">ĐỐI TÁC</div>
                </div>
                <div class="p-5">
                    <h3 class="font-bold text-gray-800 line-clamp-2 mb-3 group-hover:text-vip transition">Penthouse Đảo Kim Cương - View sông toàn cảnh</h3>
                    <div class="flex items-baseline gap-2 mb-4">
                        <span class="text-2xl font-bold text-vip">15.5 Tỷ</span>
                        <span class="text-gray-400 text-sm">| 120 m²</span>
                    </div>
                    <div class="flex items-center text-gray-500 text-xs gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                        Thủ Đức, TP. HCM
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
