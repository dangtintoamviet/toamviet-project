<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToamViet.com.vn - Tổ Ấm Việt Cho Người Việt</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="text-2xl font-bold text-red-600">TOAMVIET<span class="text-gray-800">.COM</span></div>
            <div class="hidden md:flex space-x-6 font-medium">
                <a href="#" class="hover:text-red-600">Nhà đất bán</a>
                <a href="#" class="hover:text-red-600">Cho thuê</a>
                <a href="#" class="hover:text-red-600">Dự án</a>
                <button class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">Đăng tin</button>
            </div>
        </div>
    </nav>

    <div class="relative h-[450px] bg-cover bg-center flex items-center justify-center" style="background-image: url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1200&q=80');">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative z-10 w-full max-w-4xl px-4">
            <h1 class="text-white text-3xl md:text-5xl font-bold text-center mb-8">Tìm kiếm tổ ấm mơ ước của bạn</h1>
            <div class="bg-white p-2 rounded-xl shadow-2xl flex flex-col md:flex-row gap-2">
                <input type="text" placeholder="Địa điểm, dự án, từ khóa..." class="flex-1 p-4 outline-none border-r border-gray-100">
                <select class="p-4 outline-none bg-transparent font-medium border-r border-gray-100">
                    <option>Loại nhà đất</option>
                    <option>Căn hộ</option>
                    <option>Nhà phố</option>
                </select>
                <button class="bg-red-600 text-white px-8 py-4 rounded-lg font-bold hover:bg-red-700 transition">TÌM KIẾM</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold mb-8">Bất động sản dành cho bạn</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-2 truncate">Căn hộ Studio cao cấp Quận 1</h3>
                    <p class="text-red-600 font-bold text-xl">2.5 Tỷ</p>
                    <p class="text-gray-500 text-sm mt-2">Quận 1, TP. Hồ Chí Minh • 45m²</p>
                </div>
            </div>
            </div>
    </div>

</body>
</html>
