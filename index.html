<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToamViet.com.vn - Kênh thông tin bất động sản số 1 Việt Nam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --vip-color: #008B8B; --hover-color: #FF8C00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f2f2f2; }
        .container-custom { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .nav-link { transition: all 0.3s; position: relative; }
        .nav-link:hover { color: var(--hover-color) !important; }
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-width: 200px; z-index: 100; border-top: 3px solid var(--vip-color); padding: 10px 0; }
        .dropdown-item { padding: 10px 20px; display: block; color: #333; font-size: 14px; }
        .dropdown-item:hover { background: #f9f9f9; color: var(--hover-color); }
        .save-icon { position: relative; cursor: pointer; font-size: 20px; }
        .save-count { position: absolute; top: -8px; right: -10px; background: #E03C31; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: bold; }
        .search-tab.active { background: rgba(0,0,0,0.7); color: white; border-radius: 4px 4px 0 0; }
        .section-title { font-size: 24px; font-weight: 700; color: #2C2C2C; margin-bottom: 24px; }
        #goToTop { display: none; position: fixed; bottom: 100px; right: 25px; z-index: 999; width: 45px; height: 45px; background-color: #fff; color: #333; border: 1px solid #ddd; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s; align-items: center; justify-content: center; font-size: 18px; }
        .zalo-chat-btn { position: fixed; bottom: 30px; right: 20px; z-index: 999; width: 55px; height: 55px; background-color: var(--vip-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 139, 139, 0.4); transition: all 0.3s; }
        .wiggle { animation: wiggle-ani 2s infinite; }
        @keyframes wiggle-ani { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        #chatForm { display: none; position: fixed; bottom: 95px; right: 20px; width: 320px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; overflow: hidden; }
        .chat-header { background: var(--vip-color); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { padding: 20px; }
        .chat-body input, .chat-body textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 8px; outline: none; }
        .btn-send { width: 100%; background: var(--vip-color); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-[1000]">
        <div class="container-custom h-[70px] flex justify-between items-center">
            <div class="flex items-center gap-8">
                <a href="index.html"><img src="DAI TRONG SUOT (2).png" alt="Logo ToamViet" class="h-10"></a>
                <nav class="hidden lg:flex items-center gap-6 font-semibold text-[#2C2C2C] text-[14px]">
                    <a href="index.html" class="nav-link text-[#008B8B]">Trang chủ</a>
                    <a href="nha-dat-ban.html" class="nav-link">Nhà đất bán</a>
                    <a href="nha-dat-cho-thue.html" class="nav-link">Nhà đất cho thuê</a>
                    <a href="du-an.html" class="nav-link">Dự án</a>
                    <a href="tin-tuc.html" class="nav-link text-gray-500">Tin tức</a>
                    <div class="dropdown relative h-full flex items-center cursor-pointer">
                        <span class="nav-link">Danh bạ <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i></span>
                        <div class="dropdown-menu">
                            <a href="danh-ba-doanh-nghiep.html" class="dropdown-item">Doanh nghiệp</a>
                            <a href="danh-ba-moi-gioi.html" class="dropdown-item">Môi giới</a>
                        </div>
                    </div>
                </nav>
            </div>
            
            <div class="flex items-center gap-5">
                <div class="save-icon nav-link text-gray-600">
                    <i class="fa-regular fa-heart"></i>
                    <span id="saveCountHeader" class="save-count">0</span>
                </div>
                <div class="hidden md:flex gap-3 text-[14px] font-medium border-l pl-5">
                    <a href="dang-nhap.html" class="nav-link">Đăng nhập</a>
                    <span class="text-gray-300">|</span>
                    <a href="dang-ky.html" class="nav-link">Đăng ký</a>
                </div>
                <a href="dang-tin.html" class="border-[1.5px] border-[#008B8B] text-[#008B8B] px-4 py-2 rounded-lg font-bold hover:bg-[#008B8B] hover:text-white transition uppercase text-[13px]">
                    Đăng tin
                </a>
            </div>
        </div>
    </header>

    <section class="relative h-[480px] flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/30"></div>
        <div class="relative z-10 w-full max-w-[850px] px-4 text-center">
            <div class="flex justify-center gap-1 mb-0">
                <button class="search-tab active px-6 py-2.5 text-white font-bold uppercase text-[12px]">Bán</button>
                <button class="search-tab px-6 py-2.5 text-white font-bold uppercase text-[12px] hover:bg-black/40">Cho thuê</button>
                <button class="search-tab px-6 py-2.5 text-white font-bold uppercase text-[12px] hover:bg-black/40">Dự án</button>
            </div>
            <div class="bg-black/60 p-2 rounded-lg backdrop-blur-md">
                <div class="bg-white rounded flex items-center p-1 shadow-2xl">
                    <input type="text" placeholder="Tìm nhanh: Vinhomes, Quận 2, Nhà phố..." class="flex-1 p-3.5 outline-none text-[15px]">
                    <button class="bg-[#008B8B] text-white px-10 py-3.5 rounded font-bold flex items-center gap-2 hover:opacity-90 transition">
                        <i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section class="py-12 container-custom">
        <div class="flex justify-between items-end mb-8">
            <h2 class="section-title mb-0">Bất động sản mới nhất</h2>
            <a href="nha-dat-ban.html" class="text-[#008B8B] font-semibold hover:underline text-[14px]">Xem thêm <i class="fa-solid fa-arrow-right ml-1"></i></a>
        </div>
        <div id="home-posts-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="text-gray-400 text-center col-span-full py-10">Đang cập nhật tin đăng mới...</div>
        </div>
    </section>

    <button id="goToTop" onclick="scrollToTop()"><i class="fa-solid fa-chevron-up"></i></button>
    <div class="zalo-chat-btn wiggle" onclick="toggleForm()"><i class="fa-solid fa-comment-dots"></i></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Hàm hiển thị tin đăng từ localStorage
        function displayPosts() {
            const container = document.getElementById('home-posts-container');
            const savedPosts = JSON.parse(localStorage.getItem('toamviet_posts') || '[]');
            
            if (savedPosts.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">Chưa có tin đăng nào.</div>';
                return;
            }

            container.innerHTML = savedPosts.map(post => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-lg transition cursor-pointer group">
                    <div class="relative h-[180px] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=400" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                        <div class="absolute top-2 right-2 bg-white/90 p-2 rounded-full shadow-sm hover:text-red-500"><i class="fa-regular fa-heart"></i></div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-[14px] line-clamp-2 h-10 group-hover:text-[#008B8B]">${post.title}</h3>
                        <div class="flex items-center gap-3 text-[#008B8B] font-bold text-[16px] mt-2">
                            <span>${post.price}</span><span>${post.area || '--'} m²</span>
                        </div>
                        <p class="text-gray-500 text-[12px] mt-3"><i class="fa-solid fa-location-dot mr-1"></i> ${post.district}, Bình Dương</p>
                    </div>
                </div>
            `).reverse().join(''); // Hiển thị tin mới nhất lên đầu
        }

        window.onload = function() {
            displayPosts();
            // Cập nhật số lượng tin đã lưu (nếu có tính năng này)
            const savedCount = JSON.parse(localStorage.getItem('saved_list') || '[]').length;
            document.getElementById('saveCountHeader').innerText = savedCount;
        };

        // Scripts cuộn trang và Chat của bạn giữ nguyên
        window.onscroll = function() {
            const btn = document.getElementById("goToTop");
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) btn.style.display = "flex";
            else btn.style.display = "none";
        };
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function toggleForm() { 
            var form = document.getElementById("chatForm"); 
            form.style.display = (form.style.display === "none") ? "block" : "none"; 
        }
    </script>
</body>
</html>
