                />
            </a>

            <nav class="desktop-nav" aria-label="Điều hướng chính">
                <a href="../pages/nha-dat-ban.html" class="nav-link" data-nav-key="nha-dat-ban">

                <a href="../pages/nha-dat-cho-thue.html" class="nav-link" data-nav-key="nha-dat-cho-thue">
                    Nhà đất cho thuê
                </a>

                <a href="../pages/du-an.html" class="nav-link" data-nav-key="du-an">

                </a>

                <a href="../pages/tin-tuc.html" class="nav-link" data-nav-key="tin-tuc">

                </a>

                <a href="../pages/gia-nha-dat.html" class="nav-link" data-nav-key="gia-nha-dat">
                    Giá nhà đất
                </a>

                <a href="../pages/xay-dung.html" class="nav-link" data-nav-key="xay-dung">
                    Xây dựng
                </a>

                <div class="dropdown">
                    <span class="nav-link" data-nav-key="danh-ba">
                        Danh bạ
                        <i class="fa-solid fa-chevron-down text-[10px]" style="margin-left: 4px;"></i>
                    </span>

                    <div class="dropdown-menu">
                        <a
                            href="../pages/danh-ba-doanh-nghiep.html"

                            Doanh nghiệp

                        <a

        <div class="site-header-right">

            <button

</header>

<style>
    .header-mobile-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #fff;
        color: #374151;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    }

    .header-mobile-toggle:hover {
        background: #f9fafb;
        border-color: #d1d5db;
        color: var(--primary-color);
    }

    .site-header .nav-link {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
    }

    .site-header .dropdown > .nav-link {
        cursor: pointer;
    }

    .site-header .save-icon {
        flex-shrink: 0;
    }

    .site-header .header-post-btn {
        flex-shrink: 0;
    }

    .site-header .nav-link.active,
    .site-header .dropdown-item.active {
        color: var(--primary-color) !important;
    }

    .site-header .nav-link.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -4px;
        height: 2px;
        border-radius: 999px;
        background: var(--primary-color);
    }

    .site-header .dropdown-item.active {
        background: #f0fdfa;
        font-weight: 700;
    }

    @media (max-width: 991px) {
        .header-mobile-toggle {
            display: inline-flex;
        }
    }

    @media (max-width: 640px) {
        .site-header-right {
            gap: 10px;
        }

        .site-header .save-icon {
            width: 38px;
            height: 38px;
            font-size: 18px;
        }

        .site-header .save-count {
            top: -4px;
            right: -4px;
        }
    }
</style>

<script>
    (function () {
        function updateFavoriteCount() {
            try {
                const saleFavorites = JSON.parse(localStorage.getItem("favoriteSalePosts") || "[]");
                const rentalFavorites = JSON.parse(localStorage.getItem("favoriteRentalPosts") || "[]");
                const badge = document.getElementById("headerFavoriteCount");

                if (!badge) return;

                const total = saleFavorites.length + rentalFavorites.length;
                badge.textContent = total;

                if (total <= 0) {
                    badge.style.display = "none";
                } else {
                    badge.style.display = "inline-flex";
                }
            } catch (error) {
                const badge = document.getElementById("headerFavoriteCount");
                if (badge) {
                    badge.textContent = "0";
                    badge.style.display = "none";
                }
            }
        }

        function markActiveNav() {
            const path = window.location.pathname.toLowerCase();

            const rules = [
                { key: "nha-dat-ban", match: "/pages/nha-dat-ban.html" },
                { key: "nha-dat-cho-thue", match: "/pages/nha-dat-cho-thue.html" },
                { key: "du-an", match: "/pages/du-an.html" },
                { key: "tin-tuc", match: "/pages/tin-tuc.html" },
                { key: "gia-nha-dat", match: "/pages/gia-nha-dat.html" },
                { key: "xay-dung", match: "/pages/xay-dung.html" },
                { key: "danh-ba-doanh-nghiep", match: "/pages/danh-ba-doanh-nghiep.html" },
                { key: "danh-ba-moi-gioi", match: "/pages/danh-ba-moi-gioi.html" }
            ];

            let matchedKey = "";

            for (const rule of rules) {
                if (path.includes(rule.match)) {
                    matchedKey = rule.key;
                    break;
                }
            }

            if (!matchedKey) return;

            const exactTarget = document.querySelector('[data-nav-key="' + matchedKey + '"]');
            if (exactTarget) {
                exactTarget.classList.add("active");
            }

            if (
                matchedKey === "danh-ba-doanh-nghiep" ||
                matchedKey === "danh-ba-moi-gioi"
            ) {
                const parent = document.querySelector('[data-nav-key="danh-ba"]');
                if (parent) {
                    parent.classList.add("active");
                }
            }
        }

        function bindStorageSync() {
            window.addEventListener("storage", function (event) {
                if (
                    event.key === "favoriteSalePosts" ||
                    event.key === "favoriteRentalPosts"
                ) {
                    updateFavoriteCount();
                }
            });
        }

        updateFavoriteCount();
        markActiveNav();
        bindStorageSync();
    })();
</script>
