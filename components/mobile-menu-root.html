<!-- Mobile Menu Root -->

<div id="mobileMenuContainer"></div>

<script>
(function () {
    const container = document.getElementById("mobileMenuContainer");
    if (!container) return;

    fetch("../components/mobile-menu-inner.html")
        .then((res) => {
            if (!res.ok) {
                throw new Error("Không load được mobile-menu-inner.html");
            }
            return res.text();
        })
        .then((html) => {
            container.innerHTML = html;
        })
        .catch((err) => {
            console.error("Mobile menu load lỗi:", err);
        });
})();
</script>
