<script>

/* mở menu */

function openMobileMenu(){

const menu=document.getElementById("mobileMenu");

const overlay=document.getElementById("mobileMenuOverlay");

if(menu)menu.style.transform="translateX(0)";

if(overlay)overlay.classList.remove("hidden");

}

/* đóng menu */

function closeMobileMenu(){

const menu=document.getElementById("mobileMenu");

const overlay=document.getElementById("mobileMenuOverlay");

if(menu)menu.style.transform="translateX(100%)";

if(overlay)overlay.classList.add("hidden");

}

/* khởi tạo menu */

function initMobileMenu(){

const overlay=document.getElementById("mobileMenuOverlay");

if(overlay)overlay.onclick=closeMobileMenu;

/* submenu */

document.querySelectorAll("#mobileMenu .has-sub").forEach(item=>{

item.addEventListener("click",function(){

const menu=this.nextElementSibling;

if(!menu)return;

const isOpen=menu.style.display==="block";

menu.style.display=isOpen?"none":"block";

this.classList.toggle("active",!isOpen);

});

});

/* badge tin đã lưu */

const sale=JSON.parse(localStorage.getItem("favoriteSalePosts")||"[]");

const rent=JSON.parse(localStorage.getItem("favoriteRentalPosts")||"[]");

const total=sale.length+rent.length;

const badge=document.getElementById("mobileFavoriteBadge");

if(badge){

badge.textContent=total;

if(total>0)badge.classList.remove("hidden");

}

}

/* chạy sau khi component load */

setTimeout(initMobileMenu,200);

</script>
