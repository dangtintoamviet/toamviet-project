<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý | toamviet.com.vn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --vip-color: #008B8B; --hover-color: #FF8C00; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .auth-container { max-width: 1000px; margin: 50px auto; background: white; border-radius: 15px; overflow: hidden; display: flex; box-shadow: 0 15px 35px rgba(0,0,0,0.1); min-height: 600px; }
        .auth-info { width: 40%; background: linear-gradient(135deg, var(--vip-color), #005a5a); color: white; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .auth-form { width: 60%; padding: 50px; }
        .input-box { position: relative; margin-bottom: 20px; }
        .input-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .input-box input, .input-box select { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #ddd; border-radius: 8px; outline: none; transition: 0.3s; }
        .input-box input:focus { border-color: var(--vip-color); box-shadow: 0 0 8px rgba(0,139,139,0.2); }
        .btn-main { background: var(--vip-color); color: white; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { background: #006b6b; transform: translateY(-2px); }
        .tab-btn { padding-bottom: 8px; font-weight: bold; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--vip-color); border-bottom-color: var(--vip-color); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-info">
            <img src="DAI TRONG SUOT (2).png" class="h-12 mb-8 w-fit" alt="Logo">
            <h2 class="text-2xl font-bold mb-4">Kết nối Thị trường Bất động sản</h2>
            <p class="text-sm opacity-80 leading-relaxed mb-6">Giải pháp quản lý thông minh dành cho Nhà môi giới và Doanh nghiệp chuyên nghiệp tại Việt Nam.</p>
            <div class="space-y-4">
                <div class="flex items-center gap-3"><i class="fa-solid fa-shield-halved"></i> Bảo mật dữ liệu 256-bit</div>
                <div class="flex items-center gap-3"><i class="fa-solid fa-chart-line"></i> Quản lý hiệu quả tin đăng</div>
                <div class="flex items-center gap-3"><i class="fa-solid fa-headset"></i> Hỗ trợ kỹ thuật 24/7</div>
            </div>
        </div>

        <div class="auth-form">
            <div class="flex gap-8 mb-10 border-b">
                <div class="tab-btn active" id="tab-login" onclick="switchTab('login')">ĐĂNG NHẬP</div>
                <div class="tab-btn" id="tab-register" onclick="switchTab('register')">ĐĂNG KÝ TÀI KHOẢN</div>
            </div>

            <form id="form-login" action="admin-dashboard.html"> <h3 class="text-xl font-bold mb-6 text-gray-700">Chào mừng trở lại!</h3>
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" placeholder="Email hoặc Số điện thoại" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Mật khẩu" required>
                </div>
                <div class="flex justify-between items-center text-xs mb-6">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox"> Duy trì đăng nhập</label>
                    <a href="#" class="text-[--vip-color] font-bold">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn-main uppercase tracking-wider">Đăng nhập ngay</button>
            </form>

            <form id="form-register" class="hidden">
                <h3 class="text-xl font-bold mb-6 text-gray-700">Đăng ký thành viên mới</h3>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Họ và tên đầy đủ">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" placeholder="Số điện thoại chính chủ">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-briefcase"></i>
                    <select class="bg-white">
                        <option value="">Bạn là ai?</option>
                        <option value="broker">Nhà môi giới cá nhân</option>
                        <option value="company">Doanh nghiệp / Sàn BĐS</option>
                    </select>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Tạo mật khẩu an toàn">
                </div>
                <button type="submit" class="btn-main uppercase tracking-wider">Đăng ký thành viên</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const login = document.getElementById('form-login');
            const register = document.getElementById('form-register');
            const tabL = document.getElementById('tab-login');
            const tabR = document.getElementById('tab-register');

            if(type === 'login') {
                login.classList.remove('hidden');
                register.classList.add('hidden');
                tabL.classList.add('active');
                tabR.classList.remove('active');
            } else {
                login.classList.add('hidden');
                register.classList.remove('hidden');
                tabL.classList.remove('active');
                tabR.classList.add('active');
            }
        }
    </script>
</body>
</html>
