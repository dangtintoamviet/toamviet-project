<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng tin chuyên sâu | toamviet.com.vn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --vip-color: #008B8B; --hover-color: #FF8C00; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafb; }
        .container-custom { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* Tab Styles */
        .tab-btn { padding: 12px 24px; font-weight: bold; border-bottom: 3px solid transparent; transition: 0.3s; cursor: pointer; }
        .tab-btn.active { color: var(--vip-color); border-bottom-color: var(--vip-color); }

        /* Input Styles */
        .input-field { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; font-size: 14px; }
        .input-field:focus { border-color: var(--vip-color); box-shadow: 0 0 0 3px rgba(0, 139, 139, 0.1); }
        .step-label { font-size: 11px; font-weight: 800; color: var(--vip-color); text-transform: uppercase; margin-bottom: 12px; display: block; border-left: 3px solid var(--vip-color); padding-left: 8px; }
        
        .grid-custom { display: grid; grid-template-cols: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

    <header class="bg-white border-b sticky top-0 z-[1000]">
        <div class="container-custom h-[75px] flex justify-between items-center">
            <div class="flex items-center gap-6">
                <a href="index.html"><img src="DAI TRONG SUOT (2).png" alt="Logo" class="h-10"></a>
                <nav class="hidden xl:flex items-center gap-5">
                    <a href="#" class="nav-link font-semibold">Nhà đất bán</a>
                    <a href="#" class="nav-link font-semibold">Nhà đất cho thuê</a>
                    <a href="#" class="nav-link font-semibold">Tin tức</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative px-3"><i class="fa-regular fa-heart text-xl"></i><span class="absolute -top-1 right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span></div>
                <div class="flex items-center gap-2 border-l pl-4">
                    <div class="text-right"><p class="text-[11px] font-bold">Môi giới viên</p><p class="text-[10px] text-green-500">Đang trực tuyến</p></div>
                    <div class="w-9 h-9 bg-[--vip-color] text-white rounded-full flex items-center justify-center font-bold">MG</div>
                </div>
            </div>
        </div>
    </header>

    <main class="py-10">
        <div class="container-custom">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                
                <div class="flex border-b">
                    <div onclick="setTab('ban')" id="tab-ban" class="tab-btn active w-1/2 text-center uppercase">Bất động sản Bán</div>
                    <div onclick="setTab('thue')" id="tab-thue" class="tab-btn w-1/2 text-center uppercase">Bất động sản Cho thuê</div>
                </div>

                <form id="pro-post-form" class="p-8 space-y-8">
                    
                    <section>
                        <label class="step-label">1. Thông tin chung & Tiêu đề</label>
                        <div class="space-y-4">
                            <input type="text" id="title" placeholder="Tiêu đề (VD: Biệt thự sân vườn 2 mặt tiền đường lớn, sổ đỏ trao tay...)" class="input-field" required>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <select id="category" class="input-field">
                                    <option>Nhà phố</option>
                                    <option>Căn hộ chung cư</option>
                                    <option>Đất nền</option>
                                    <option>Văn phòng</option>
                                </select>
                                <input type="text" id="price" placeholder="Giá (VD: 3.5 Tỷ hoặc 15 Tr/tháng)" class="input-field" required>
                                <input type="number" id="area" placeholder="Tổng diện tích (m2)" class="input-field" required>
                            </div>
                        </div>
                    </section>

                    <section>
                        <label class="step-label">2. Thông số chi tiết & Pháp lý</label>
                        <div class="grid-custom">
                            <div>
                                <p class="text-[11px] text-gray-500 mb-1">Mặt tiền (m)</p>
                                <input type="number" step="0.1" id="width" placeholder="VD: 5.5" class="input-field">
                            </div>
                            <div>
                                <p class="text-[11px] text-gray-500 mb-1">Số phòng ngủ</p>
                                <input type="number" id="bedroom" placeholder="VD: 3" class="input-field">
                            </div>
                            <div>
                                <p class="text-[11px] text-gray-500 mb-1">Số Toilet</p>
                                <input type="number" id="wc" placeholder="VD: 2" class="input-field">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                            <select id="direction" class="input-field">
                                <option value="">-- Chọn hướng nhà --</option>
                                <option>Đông</option><option>Tây</option><option>Nam</option><option>Bắc</option>
                                <option>Đông Bắc</option><option>Tây Bắc</option><option>Đông Nam</option><option>Tây Nam</option>
                            </select>
                            <select id="legal" class="input-field">
                                <option value="">-- Tình trạng pháp lý --</option>
                                <option>Sổ đỏ / Sổ hồng</option>
                                <option>Hợp đồng mua bán</option>
                                <option>Đang chờ sổ</option>
                            </select>
                        </div>
                    </section>

                    <section>
                        <label class="step-label">3. Hình ảnh & Video giới thiệu</label>
                        <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:border-[--vip-color] transition bg-gray-50 mb-4 cursor-pointer">
                            <i class="fa-solid fa-camera-rotate text-3xl text-gray-300 mb-2"></i>
                            <p class="text-sm text-gray-500">Đăng từ 4-10 ảnh để tin có tương tác tốt nhất</p>
                        </div>
                        <div class="relative">
                            <i class="fa-brands fa-youtube absolute left-4 top-3 text-red-600"></i>
                            <input type="url" id="video_url" placeholder="Dán liên kết Video (YouTube, TikTok, Reels...)" class="input-field pl-10">
                        </div>
                    </section>

                    <section class="bg-slate-50 p-6 rounded-xl border border-slate-100">
                        <label class="step-label">4. Thông tin người đăng tin</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="contact_name" placeholder="Tên liên hệ" class="input-field" required>
                            <input type="tel" id="contact_phone" placeholder="Số điện thoại" class="input-field" required>
                        </div>
                    </section>

                    <button type="submit" class="w-full bg-[--vip-color] hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg uppercase">
                        Gửi tin & Chờ phê duyệt
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t pt-10 pb-6 mt-20">
        <div class="container-custom text-center">
            <div class="flex justify-center gap-6 mb-6">
                <a href="#" class="text-gray-400 hover:text-blue-600"><i class="fa-brands fa-facebook text-2xl"></i></a>
                <a href="#" class="text-gray-400 hover:text-red-600"><i class="fa-brands fa-youtube text-2xl"></i></a>
            </div>
            <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">© 2026 BẤT ĐỘNG SẢN TỔ ẤM VIỆT</p>
        </div>
    </footer>

    <script>
        let currentType = 'ban';
        
        function setTab(type) {
            currentType = type;
            document.getElementById('tab-ban').classList.remove('active');
            document.getElementById('tab-thue').classList.remove('active');
            document.getElementById('tab-' + type).classList.add('active');
            // Cập nhật gợi ý giá
            document.getElementById('price').placeholder = type === 'ban' ? 'Giá bán (VD: 3.5 Tỷ)' : 'Giá thuê/tháng (VD: 12 Tr/tháng)';
        }

        document.getElementById('pro-post-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                id: Date.now(),
                type: currentType,
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                specs: {
                    bed: document.getElementById('bedroom').value,
                    wc: document.getElementById('wc').value,
                    width: document.getElementById('width').value
                },
                contact: document.getElementById('contact_phone').value,
                status: 'Chờ duyệt'
            };
            
            // Lưu dữ liệu vào hệ thống (giả lập)
            let pending = JSON.parse(localStorage.getItem('pendingNews')) || [];
            pending.push(data);
            localStorage.setItem('pendingNews', JSON.stringify(pending));
            
            alert('Tin đã được gửi! Admin sẽ kiểm duyệt các thông số kỹ thuật trước khi hiển thị.');
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
